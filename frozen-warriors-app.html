<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<title>Frozen Warriors</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet" />
<style>
  html, body { margin: 0; padding: 0; height: 100%; background: #03070d; overscroll-behavior: none; }
  #root { position: fixed; inset: 0; overflow: hidden; }
</style>
<style id="fw-splash-style">
  #fw-splash{position:fixed;inset:0;z-index:99999;background:#000;display:flex;
    flex-direction:column;align-items:center;justify-content:center;
    font-family:'Space Grotesk',system-ui,sans-serif;color:#fff;overflow:hidden;
    transition:opacity .5s ease, visibility .5s ease;}
  #fw-splash.fw-hide{opacity:0;visibility:hidden;pointer-events:none;}
  #fw-splash .fw-glow{position:absolute;inset:0;
    background:radial-gradient(120% 80% at 50% 40%, rgba(103,232,249,0.09), rgba(0,0,0,0) 60%);}
  #fw-splash .fw-snow{position:absolute;inset:0;overflow:hidden;pointer-events:none;}
  #fw-splash .fw-flake{position:absolute;top:-14px;border-radius:50%;}
  #fw-splash .fw-center{position:relative;z-index:3;display:flex;flex-direction:column;
    align-items:center;gap:26px;padding:0 24px;}
  #fw-splash .fw-logo{width:190px;height:auto;display:block;
    filter:drop-shadow(0 0 26px rgba(103,232,249,0.28));}
  #fw-splash .fw-eyebrow{font-family:'JetBrains Mono',ui-monospace,monospace;font-size:12px;
    font-weight:500;letter-spacing:5px;color:rgba(234,246,255,0.62);margin-bottom:6px;text-align:center;}
  #fw-splash .fw-title{font-size:52px;font-weight:700;letter-spacing:1px;line-height:.96;
    color:#fff;text-shadow:0 0 28px rgba(103,232,249,0.35);text-align:center;}
  #fw-splash .fw-slogan{display:flex;align-items:center;justify-content:center;gap:9px;margin-top:18px;
    font-family:'JetBrains Mono',ui-monospace,monospace;font-size:11px;letter-spacing:1.5px;
    color:#67e8f9;text-transform:uppercase;}
  #fw-splash .fw-slogan .d{opacity:.5;}
  #fw-splash .fw-dots{position:absolute;bottom:8.5%;display:flex;gap:9px;z-index:3;}
  #fw-splash .fw-dot{width:7px;height:7px;border-radius:50%;background:#67e8f9;
    animation:fw-dot 1.2s ease-in-out infinite;}
  @keyframes fw-fall{0%{transform:translateY(-20px) translateX(0);opacity:0}
    8%{opacity:var(--op,.8)}92%{opacity:var(--op,.8)}
    100%{transform:translateY(108vh) translateX(var(--drift,20px));opacity:0}}
  @keyframes fw-dot{0%,100%{opacity:.25;transform:scale(.82)}50%{opacity:1;transform:scale(1)}}
  @media (prefers-reduced-motion: reduce){#fw-splash .fw-dot{animation:none;opacity:.9}}
</style>
</head>

<script type="text/babel" data-from="common.jsx">
// common.jsx — shared bits for Frozen Warriors wireframes
// Hex radar SVG, fake data, sketchy primitives.

const AXES = ['Force', 'Respiration', 'Anaérobie', 'Puissance', 'Endurance', 'Tension'];
const AXES_SHORT = ['FOR', 'RES', 'ANA', 'PUI', 'END', 'TEN'];

// 28 warriors — 8 detailed, 20 procgen
const PRIMARY = [
  { id: 'm',  name: 'Marcus L.',   rank: 1,  stats: [88, 72, 65, 81, 90, 78], prev: [85, 70, 68, 75, 88, 80], habits: 27 },
  { id: 'k',  name: 'Klara N.',    rank: 2,  stats: [76, 84, 88, 70, 75, 82], prev: [70, 80, 85, 68, 73, 79], habits: 25 },
  { id: 'j',  name: 'Jonas R.',    rank: 3,  stats: [82, 60, 70, 85, 68, 74], prev: [80, 62, 68, 80, 65, 70], habits: 22 },
  { id: 'a',  name: 'Aïsha B.',    rank: 4,  stats: [70, 90, 82, 65, 88, 80], prev: [68, 86, 80, 62, 84, 78], habits: 28 },
  { id: 's',  name: 'Sven D.',     rank: 5,  stats: [92, 55, 60, 90, 62, 70], prev: [88, 58, 64, 85, 60, 68], habits: 18 },
  { id: 'l',  name: 'Léa M.',      rank: 6,  stats: [65, 78, 75, 60, 82, 88], prev: [62, 75, 72, 58, 80, 85], habits: 24 },
  { id: 't',  name: 'Théo V.',     rank: 7,  stats: [74, 70, 72, 76, 73, 75], prev: [70, 68, 70, 72, 70, 72], habits: 20 },
  { id: 'n',  name: 'Nora P.',     rank: 8,  stats: [68, 82, 80, 64, 78, 84], prev: [66, 80, 78, 62, 76, 80], habits: 26 },
];
const WARRIORS = [
  ...PRIMARY,
  ...Array.from({ length: 20 }, (_, i) => {
    const seed = (i + 1) * 17;
    const r = (n) => 50 + ((seed * (n + 1) * 13) % 45);
    return {
      id: 'w' + i,
      name: ['Eva','Iris','Bjorn','Olaf','Kai','Mila','Ruth','Yuki','Erik','Ana','Tom','Saga','Liv','Per','Ines','Otto','Vera','Noé','Sif','Ulf'][i] + ' ' + 'XSPMTABFR'[i%9] + '.',
      rank: i + 9,
      stats: [r(1), r(2), r(3), r(4), r(5), r(6)],
      prev: [r(1) - 3, r(2) - 2, r(3) - 4, r(4) - 1, r(5) - 3, r(6) - 2],
      habits: 10 + (seed % 18),
    };
  }),
];

// Team average — naive mean
const TEAM_AVG = AXES.map((_, i) =>
  Math.round(WARRIORS.reduce((s, w) => s + w.stats[i], 0) / WARRIORS.length)
);

const MONTHS = ['Oct','Nov','Déc','Jan','Fév','Mar','Avr'];

// ─── Hex math ──────────────────────────────────────────────────────────
function hexPoint(i, r, cx, cy) {
  const a = (Math.PI * 2 / 6) * i - Math.PI / 2;
  return [cx + Math.cos(a) * r, cy + Math.sin(a) * r];
}

// ─── Hex Radar ─────────────────────────────────────────────────────────
function HexRadar({
  size = 260,
  values,
  ghost = null,            // previous month or other warrior
  teamAvg = null,
  accent = '#0e7490',
  ghostAccent = '#999',
  ink = '#222',
  filled = 'stroke',       // 'stroke' | 'fill' | 'glow'
  showLabels = true,
  highlightStrong = true,
  pulse = true,
  labelFont = "'Kalam', cursive",
}) {
  const cx = size / 2, cy = size / 2;
  const r = size * 0.36;
  const labelR = size * 0.46;

  // Find strongest & weakest axis
  const strongIdx = values.indexOf(Math.max(...values));
  const weakIdx = values.indexOf(Math.min(...values));

  const ring = (f) => Array.from({ length: 6 }, (_, i) => hexPoint(i, r * f, cx, cy));
  const ringStr = (pts) => pts.map(p => p.join(',')).join(' ');
  const valuePts = values.map((v, i) => hexPoint(i, r * Math.max(8, v) / 100, cx, cy));
  const ghostPts = ghost ? ghost.map((v, i) => hexPoint(i, r * Math.max(8, v) / 100, cx, cy)) : null;
  const avgPts = teamAvg ? teamAvg.map((v, i) => hexPoint(i, r * v / 100, cx, cy)) : null;

  const labels = AXES.map((axis, i) => {
    const [x, y] = hexPoint(i, labelR, cx, cy);
    return { axis, x, y, i, value: values[i] };
  });

  const glowOn = filled === 'glow';

  return (
    <svg width={size} height={size} viewBox={`-20 -20 ${size + 40} ${size + 40}`} style={{ overflow: 'visible' }}>
      <defs>
        <filter id={`glow-${size}`} x="-50%" y="-50%" width="200%" height="200%">
          <feGaussianBlur stdDeviation="3" />
        </filter>
      </defs>
      {/* concentric rings */}
      {[0.33, 0.66, 1].map((f, idx) => (
        <polygon key={idx} points={ringStr(ring(f))}
          fill="none" stroke={ink} strokeOpacity={0.18}
          strokeWidth={1} strokeDasharray={idx < 2 ? '3 4' : ''} />
      ))}
      {/* axes spokes */}
      {Array.from({ length: 6 }, (_, i) => {
        const [x, y] = hexPoint(i, r, cx, cy);
        return <line key={i} x1={cx} y1={cy} x2={x} y2={y}
          stroke={ink} strokeOpacity={0.16} strokeWidth={1} strokeDasharray="2 4" />;
      })}
      {/* team avg (filigree) */}
      {avgPts && (
        <polygon points={ringStr(avgPts)} fill="none"
          stroke={ink} strokeOpacity={0.45} strokeWidth={1.5} strokeDasharray="5 3" />
      )}
      {/* ghost (previous month) */}
      {ghostPts && (
        <polygon points={ringStr(ghostPts)}
          fill={ghostAccent} fillOpacity={0.07}
          stroke={ghostAccent} strokeOpacity={0.7}
          strokeWidth={1.5} strokeDasharray="4 3" />
      )}
      {/* values shape */}
      {glowOn && (
        <polygon points={ringStr(valuePts)} fill={accent} fillOpacity={0.4}
          filter={`url(#glow-${size})`} />
      )}
      <polygon points={ringStr(valuePts)}

      {showLabels && labels.map(({ axis, x, y, i, value }) => {

                  <animate attributeName="opacity" values="0.5;1;0.5" dur="1.6s" repeatCount="indefinite" />

            )}

}

function SketchBox({ children, style = {}, dashed = true, tilt = 0, ...rest }) {

function Chip({ children, tone = 'ink', style = {} }) {

<script type="text/babel" data-from="hifi-character.jsx">
// hifi-character.jsx — Hi-fi "Fiche guerrier" (dark glacial, RPG/tech)

// ─── Frost particles (drifting upward) ─────────────────────────────────
function FrostParticles({ width = 402, height = 874, count = 32 }) {
  const particles = React.useMemo(() => {
    return Array.from({ length: count }, (_, i) => {
      const x = ((i * 9301 + 49297) % 233280 / 233280) * width;
      const r = 0.6 + ((i * 31) % 18) / 12;
      const dur = 10 + ((i * 7) % 16);
      const delay = -((i * 1.7) % dur);
      const sway = (((i % 5) - 2) * 10);
      const opacity = 0.25 + ((i % 7) / 22);
      return { x, r, dur, delay, sway, opacity };
    });
  }, [width, count]);
  return (
    <svg width={width} height={height} style={{ position: 'absolute', inset: 0, pointerEvents: 'none', overflow: 'hidden' }}>
      {particles.map((p, i) => (
        <circle key={i} cx={p.x} cy={height + 12} r={p.r} fill={ICE.accentBright} opacity={p.opacity}>
          <animate attributeName="cy" from={height + 12} to={-12} dur={`${p.dur}s`} begin={`${p.delay}s`} repeatCount="indefinite" />
          <animate attributeName="cx" values={`${p.x};${p.x + p.sway};${p.x}`} dur={`${p.dur * 0.7}s`} begin={`${p.delay}s`} repeatCount="indefinite" />
        </circle>
      ))}
    </svg>
  );
}

// ─── Dark hex radar with draw-on animation ─────────────────────────────
function HexRadarDark({
  size = 280, values, present = null, ghost = null, teamAvg = null,
  accent = ICE.accent, ghostAccent = ICE.accentDark,
  drawOnKey = 0, pulse = true,
}) {
  const cx = size / 2, cy = size / 2;
  const r = size * 0.36;
  const labelR = size * 0.49;

  const has = (i) => (present ? present[i] : values[i] > 0);
  // Strong / weak only among measured axes
  const measured = values.map((v, i) => ({ v, i })).filter((s) => has(s.i));
  const strongIdx = measured.length ? measured.reduce((a, b) => (b.v > a.v ? b : a)).i : -1;
  const weakIdx = measured.length > 1 ? measured.reduce((a, b) => (b.v < a.v ? b : a)).i : -1;

  const ring = (f) => Array.from({ length: 6 }, (_, i) => hexPoint(i, r * f, cx, cy));
  const ringStr = (pts) => pts.map(p => p.join(',')).join(' ');
  const valuePts = values.map((v, i) => hexPoint(i, r * Math.max(8, v) / 100, cx, cy));
  const ghostPts = ghost ? ghost.map((v, i) => hexPoint(i, r * Math.max(8, v) / 100, cx, cy)) : null;
  const avgPts = teamAvg ? teamAvg.map((v, i) => hexPoint(i, r * v / 100, cx, cy)) : null;

  const perimeter = valuePts.reduce((sum, p, i) => {
    const n = valuePts[(i + 1) % valuePts.length];
    return sum + Math.hypot(n[0] - p[0], n[1] - p[1]);
  }, 0);

  return (
    <svg width={size} height={size} viewBox={`-30 -30 ${size + 60} ${size + 60}`}
      style={{ overflow: 'visible', display: 'block' }}>
      <defs>
        <filter id="radar-glow" x="-50%" y="-50%" width="200%" height="200%">
          <feGaussianBlur stdDeviation="3.5" result="blur" />
          <feMerge><feMergeNode in="blur" /><feMergeNode in="SourceGraphic" /></feMerge>
        </filter>
        <radialGradient id="radar-aurora" cx="50%" cy="50%" r="50%">
          <stop offset="0%" stopColor={ICE.accent} stopOpacity="0.18" />
          <stop offset="55%" stopColor={ICE.accent} stopOpacity="0.06" />
          <stop offset="100%" stopColor={ICE.accent} stopOpacity="0" />
        </radialGradient>
      </defs>

      {/* aurora */}
      <circle cx={cx} cy={cy} r={r * 1.5} fill="url(#radar-aurora)" />

      {/* rings */}
      {[0.33, 0.66, 1].map((f, idx) => (
        <polygon key={idx} points={ringStr(ring(f))}
          fill="none" stroke={ICE.inkXLow}
          strokeWidth={idx === 2 ? 1.2 : 0.8}
          strokeDasharray={idx < 2 ? '2 4' : ''} />
      ))}

      {/* spokes */}
      {Array.from({ length: 6 }, (_, i) => {
        const [x, y] = hexPoint(i, r, cx, cy);
        return <line key={i} x1={cx} y1={cy} x2={x} y2={y}
          stroke={ICE.inkXLow} strokeWidth={0.8} strokeDasharray="1 4" />;
      })}

      {/* team avg silhouette */}
      {avgPts && (
        <polygon points={ringStr(avgPts)} fill="none"
          stroke={ICE.inkLow} strokeWidth={1.2} strokeDasharray="3 4" />
      )}

      {/* ghost (last month) */}
      {ghostPts && (
        <polygon points={ringStr(ghostPts)}
          fill={ghostAccent} fillOpacity={0.05}
          stroke={ghostAccent} strokeOpacity={0.6}
          strokeWidth={1.4} strokeDasharray="5 4" />
      )}

      {/* fill (under stroke, no glow) */}
      <polygon points={ringStr(valuePts)}
        fill={accent} fillOpacity={0.12} />

      {/* glow stroke with draw-on animation */}
      <polygon points={ringStr(valuePts)}
        fill="none" stroke={accent} strokeWidth={2.4}
        strokeLinejoin="round" strokeLinecap="round"
        filter="url(#radar-glow)"
        strokeDasharray={perimeter}
        strokeDashoffset={perimeter}>
        <animate key={drawOnKey} attributeName="stroke-dashoffset"
          from={perimeter} to="0" dur="1.6s"
          begin="0s" fill="freeze" calcMode="spline"
          keySplines="0.2 0.8 0.2 1" keyTimes="0;1" values={`${perimeter};0`} />
      </polygon>

      {/* vertex glyphs */}
      {valuePts.map(([x, y], i) => {
        const measuredAxis = has(i);
        const isStrong = i === strongIdx;
        const isWeak = i === weakIdx;
        const color = !measuredAxis ? ICE.inkLow : isWeak ? ICE.weak : accent;
        return (
          <g key={i} opacity="0">
            <animate attributeName="opacity" from="0" to="1" dur="0.4s"
              begin={`${0.4 + i * 0.12}s`} fill="freeze" />
            {isStrong && pulse && (
              <circle cx={x} cy={y} r="6" fill={accent} opacity="0.5">
                <animate attributeName="r" values="6;18;6" dur="2s" repeatCount="indefinite" />
                <animate attributeName="opacity" values="0.6;0;0.6" dur="2s" repeatCount="indefinite" />
              </circle>
            )}
            {measuredAxis ? (
              <circle cx={x} cy={y} r={isStrong ? 5.5 : isWeak ? 4 : 4.5}
                fill={color} stroke={ICE.bg0} strokeWidth={1.5} />
            ) : (
              <circle cx={x} cy={y} r={3.5}
                fill={ICE.bg0} stroke={ICE.inkLow} strokeWidth={1.2} strokeDasharray="2 2" />
            )}
            {isStrong && measuredAxis && (
              <circle cx={x} cy={y} r="2" fill={ICE.bg0} />
            )}
          </g>
        );
      })}

      {/* labels */}
      {AXES.map((axis, i) => {
        const [x, y] = hexPoint(i, labelR, cx, cy);
        const measuredAxis = has(i);
        const isStrong = i === strongIdx;
        const isWeak = i === weakIdx;
        const labelColor = !measuredAxis ? ICE.inkLow : isStrong ? ICE.accentBright : isWeak ? ICE.weak : ICE.inkDim;
        return (
          <g key={i} opacity="0">
            <animate attributeName="opacity" from="0" to="1" dur="0.5s"
              begin={`${0.6 + i * 0.1}s`} fill="freeze" />
            <text x={x} y={y - 4} fontSize={9.5} textAnchor="middle"
              fontFamily={HI_FONT_MONO} fill={labelColor}
              fontWeight={600} letterSpacing="1" opacity={measuredAxis ? 1 : 0.6}>
              {axis.toUpperCase()}
            </text>
            <text x={x} y={y + 10} fontSize={measuredAxis ? 13 : 10} textAnchor="middle"
              fontFamily={HI_FONT_MONO} fill={!measuredAxis ? ICE.inkLow : isStrong ? ICE.accent : ICE.ink}
              fontWeight={700} opacity={measuredAxis ? 1 : 0.55}>
              {measuredAxis ? values[i] : 'n/d'}
            </text>
            {measuredAxis && (isStrong || isWeak) && (
              <text x={x} y={y + 22} fontSize={7.5} textAnchor="middle"
                fontFamily={HI_FONT_MONO} fill={isStrong ? ICE.accent : ICE.weak}
                fontWeight={700} letterSpacing="0.5">
                {isStrong ? '★ PT FORT' : '⚠ À TRAVAILLER'}
                {isStrong && pulse && (
                  <animate attributeName="opacity" values="0.5;1;0.5" dur="1.8s" repeatCount="indefinite" />
                )}
              </text>
            )}
          </g>
        );
      })}

      {/* center crosshair */}
      <g opacity="0.4">
        <line x1={cx - 4} y1={cy} x2={cx + 4} y2={cy} stroke={ICE.accent} strokeWidth="1" />
        <line x1={cx} y1={cy - 4} x2={cx} y2={cy + 4} stroke={ICE.accent} strokeWidth="1" />
      </g>
    </svg>
  );
}

// ─── Animated count-up ─────────────────────────────────────────────────
function CountUp({ to, dur = 1100, suffix = '', deps = [] }) {
  const [v, setV] = React.useState(0);
  React.useEffect(() => {
    let raf, start;
    const tick = (t) => {
      if (!start) start = t;
      const k = Math.min(1, (t - start) / dur);
      const eased = 1 - Math.pow(1 - k, 3);
      setV(Math.round(to * eased));
      if (k < 1) raf = requestAnimationFrame(tick);
    };
    raf = requestAnimationFrame(tick);
    return () => cancelAnimationFrame(raf);
  }, [to, dur, ...deps]);
  return <>{v}{suffix}</>;
}

// ─── Tiny sparkline ────────────────────────────────────────────────────
function SparkDark({ values, width = 70, height = 22, accent = ICE.accent, trend }) {
  const max = Math.max(...values, 100);
  const min = Math.min(...values, 0);
  const span = Math.max(1, max - min);
  const pts = values.map((v, i) => [
    (i / (values.length - 1)) * (width - 4) + 2,
    height - 2 - ((v - min) / span) * (height - 6),
  ]);
  const d = 'M' + pts.map(p => p.join(',')).join(' L');
  const last = pts[pts.length - 1];
  const color = trend > 0 ? ICE.good : trend < 0 ? ICE.bad : accent;
  return (
    <svg width={width} height={height} style={{ display: 'block' }}>
      <defs>
        <linearGradient id="spark-fill" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stopColor={color} stopOpacity="0.3" />
          <stop offset="100%" stopColor={color} stopOpacity="0" />
        </linearGradient>
      </defs>
      <path d={`${d} L ${last[0]},${height} L ${pts[0][0]},${height} Z`} fill="url(#spark-fill)" />
      <path d={d} fill="none" stroke={color} strokeWidth="1.4" strokeLinecap="round" strokeLinejoin="round" />
      <circle cx={last[0]} cy={last[1]} r="2.2" fill={color} />
    </svg>
  );
}

// ─── Header ────────────────────────────────────────────────────────────
function HFHeader() {

}

// ─── Identity row ──────────────────────────────────────────────────────
function HFIdentity({ w, delta, totalWarriors, hasPrev = true, measuredCount = 6 }) {
  const initial = (w.name && w.name.trim()[0]) ? w.name.trim()[0].toUpperCase() : '?';
  const total = totalWarriors || WARRIORS.length;
  return (
    <div style={{ padding: '8px 18px 4px', display: 'flex', gap: 14, alignItems: 'center', position: 'relative', zIndex: 4 }}>
      <div style={{
        width: 60, height: 60, borderRadius: '50%',
        background: `linear-gradient(135deg, ${ICE.bg2}, ${ICE.bg1})`,

        display: 'grid', placeItems: 'center',

        <div style={{

        <div style={{

        <div style={{ display: 'flex', gap: 6, marginTop: 6 }}>

function HFAxisRow({ axis, value, prev, history, idx, isStrong, isWeak, measured = true, prevMeasured = true, hasPrev = true }) {

      <div>
        <div style={{
          fontFamily: HI_FONT_TITLE, fontSize: 13, fontWeight: 500,

        {measured && (isStrong || isWeak) && (

        color: delta > 0 ? ICE.good : delta < 0 ? ICE.bad : ICE.inkLow,
        textAlign: 'right',
      }}>{showDelta ? (delta > 0 ? '+' : '') + delta : ''}</div>
    </div>
  );
}

// ─── Habits strip (30 shards) ──────────────────────────────────────────
function HFHabits({ habits, total = 30 }) {
  return (
    <div style={{
      padding: '10px 14px',

  if (isNaN(d)) return '—';
  const m = ['jan', 'fév', 'mar', 'avr', 'mai', 'juin', 'juil', 'aoû', 'sep', 'oct', 'nov', 'déc'][d.getMonth()];

function HiFiCharacter({
  warrior, teamAvg, totalWarriors,
  accent = ICE.accent, pulse = true, ghostOn = true, particlesOn = true,
  selector = null,
}) {
  const w = warrior || WARRIORS[0];
  const avg = teamAvg || TEAM_AVG;
  const total = totalWarriors || WARRIORS.length;
  const present = w.present || w.stats.map((v) => v > 0);
  const prevPresent = w.prevPresent || present;
  const hasPrev = w.hasPrev != null ? w.hasPrev : true;

  // History per axis: use real per-session history if available, else
  // synthesise a smooth 7-point ramp from prev → current.
  const history = AXES.map((_, i) => {
    const real = w.histByCat && w.histByCat[i];
    if (real && real.length >= 2) return real;
    return Array.from({ length: 7 }, (_, m) => {
      const f = m / 6;
      const v = w.prev[i] + (w.stats[i] - w.prev[i]) * f;
      const wobble = ((i * 11 + m * 17) % 7) - 3;
      return Math.max(20, Math.min(100, Math.round(v + wobble)));
    });
  });

  const measured = w.stats.map((v, i) => ({ v, i })).filter((s) => present[s.i]);

  const weakIdx = measured.length > 1 ? measured.reduce((a, b) => (b.v < a.v ? b : a)).i : -1;
  // Delta only over axes measured in both sessions
  const totalDelta = hasPrev
    ? w.stats.reduce((sum, v, i) => (present[i] && prevPresent[i] ? sum + (v - w.prev[i]) : sum), 0)
    : 0;
  const measuredCount = present.filter(Boolean).length;
  const curMonth = fmtMonth(w.latestDate);

  return (
    <div style={{
      position: 'relative', height: '100%', overflow: 'hidden',
      background: `radial-gradient(120% 70% at 50% 18%, ${ICE.bg2} 0%, ${ICE.bg1} 38%, ${ICE.bg0} 80%)`,

        }
        @keyframes hfFade {
          from { opacity: 0; transform: translateY(8px); }
          to { opacity: 1; transform: translateY(0); }
        }
        .hf-fade { animation: hfFade 0.6s ease-out both; }
        .hf-scroll { overflow-y: auto; height: 100%; }
        .hf-scroll::-webkit-scrollbar { width: 0; }
      `}</style>

      {/* particle ambient */}
      {particlesOn && <FrostParticles width={SCREEN_W} height={SCREEN_H} />}

      {/* grain / scanline overlay */}
      <div style={{
        position: 'absolute', inset: 0, pointerEvents: 'none', zIndex: 1,
        background: 'repeating-linear-gradient(0deg, rgba(255,255,255,0.012) 0px, transparent 1px, transparent 3px)',
        mixBlendMode: 'screen',
      }} />

      <div className="hf-scroll" style={{ paddingTop: 50, paddingBottom: 40, position: 'relative', zIndex: 2 }}>
        <HFHeader />
        {selector}
        <HFIdentity w={w} delta={totalDelta} hasPrev={hasPrev} measuredCount={measuredCount} totalWarriors={total} />

        {/* Radar */}
        <div style={{ position: 'relative', display: 'grid', placeItems: 'center', margin: '4px 0 6px' }}>
          <div className="hf-fade" style={{ animationDelay: '0.1s' }}>
            <HexRadarDark size={260} values={w.stats}
              present={present}
              ghost={ghostOn && hasPrev ? w.prev : null}
              teamAvg={avg}
              accent={accent} pulse={pulse} />
          </div>
        </div>

        {/* Section label */}
        <div style={{
          padding: '8px 18px 6px',
          display: 'flex', alignItems: 'center', justifyContent: 'space-between',
        }}>
          <div style={{
            fontFamily: HI_FONT_MONO, fontSize: 9.5, letterSpacing: 1.6,
            color: ICE.inkLow, textTransform: 'uppercase', whiteSpace: 'nowrap',
          }}>· Détails · historique</div>
          <div style={{
            fontFamily: HI_FONT_MONO, fontSize: 9, letterSpacing: 1,
            color: ICE.inkXLow, whiteSpace: 'nowrap',
          }}>—— {curMonth}</div>
        </div>

        {/* Axis rows */}
        <div className="hf-fade" style={{
          animationDelay: '0.4s',
          margin: '0 14px',
          border: `1px solid ${ICE.inkXLow}`,
          borderRadius: 14,
          background: `linear-gradient(180deg, ${ICE.bg1}cc, ${ICE.bg0}cc)`,
          overflow: 'hidden',
        }}>
          {AXES.map((axis, i) => (
            <HFAxisRow key={axis} axis={axis} idx={i}
              value={w.stats[i]} prev={w.prev[i]}
              measured={present[i]} prevMeasured={prevPresent[i]} hasPrev={hasPrev}
              history={history[i]}
              isStrong={i === strongIdx} isWeak={i === weakIdx} />
          ))}
        </div>

        {/* Habits + Challenge */}
        <div className="hf-fade" style={{ animationDelay: '0.6s', display: 'flex', gap: 8, padding: '12px 14px 4px' }}>
          <HFHabits habits={w.habits} />
          <HFChallenge rank={w.challengeRank} name={w.challengeName} totalWarriors={total} />
        </div>

        {/* Footer month chip */}
        <div style={{ padding: '8px 14px 6px', display: 'flex', justifyContent: 'center' }}>
          <div style={{
            display: 'inline-flex', alignItems: 'center', gap: 8,
            padding: '6px 14px', borderRadius: 99,
            border: `1px solid ${ICE.accent}33`,
            background: `${ICE.accent}10`, backdropFilter: 'blur(6px)',
            fontFamily: HI_FONT_MONO, fontSize: 10, letterSpacing: 1.4,
            color: ICE.accent, textTransform: 'uppercase',
          }}>
            {w.prevDate && fmtMonth(w.prevDate) !== curMonth ? fmtMonth(w.prevDate) + ' → ' : ''}<span style={{ color: ICE.accentBright, fontWeight: 700 }}>{curMonth}</span>
          </div>
        </div>
      </div>
    </div>
  );
}

Object.assign(window, {

// ─── Body tracking helpers (ported from production logic) ──────────────
// Pace stored in grams/week. Returns kg/week (signed) averaged over gaps.
function avgPaceKg(entries) {
  if (!entries || entries.length < 2) return null;
  let total = 0, count = 0;
  for (let i = 1; i < entries.length; i++) {
    const days = Math.max(1, (new Date(entries[i].date) - new Date(entries[i - 1].date)) / 86400000);
    total += ((entries[i].weight - entries[i - 1].weight) / days) * 7;
    count++;
  }
  return count > 0 ? +(total / count).toFixed(3) : null;
}

// 4-tier color for a signed kg/week pace given the goal.
// green = inside target range · yellow = right way but too slow ·
// orange = right way but too fast (or no range set, off-target) · red = wrong way
function bodyPaceColor(profile, paceKg) {
  if (paceKg == null) return 'grey';
  const goal = profile.goalType;
  const goodDir = (goal === 'perte' && paceKg < 0) || (goal === 'prise' && paceKg > 0) || goal === 'recompo';
  if (goal !== 'recompo' && !goodDir) return 'red';
  const absG = Math.abs(paceKg) * 1000;
  const pace = profile.weeklyPace, range = profile.paceRange;
  if (goal === 'recompo') {
    if (range == null) return 'green';
    return absG <= range ? 'green' : 'orange';
  }
  if (pace == null || range == null) return 'green';
  if (absG >= pace - range && absG <= pace + range) return 'green';
  return absG < pace - range ? 'yellow' : 'orange';
}

// Weekly delta = change between the last two entries, in kg (signed).
function lastWeekDeltaKg(entries) {
  if (!entries || entries.length < 2) return null;
  return +(entries[entries.length - 1].weight - entries[entries.length - 2].weight).toFixed(3);
}

function projectionDate(profile, entries) {
  if (!profile || !entries || entries.length < 2 || profile.target == null) return null;
  const avg = avgPaceKg(entries);
  if (!avg || avg === 0) return null;
  const remaining = profile.target - entries[entries.length - 1].weight;
  if (Math.sign(remaining) !== Math.sign(avg)) return null;
  const weeksLeft = remaining / avg;
  const d = new Date(entries[entries.length - 1].date);
  d.setDate(d.getDate() + Math.round(weeksLeft * 7));
  return d;
}

// ─── Retro 8-bit audio (shared AudioContext, reused across the app) ─────
function fwAudioCtx() {
  const A = window.AudioContext || window.webkitAudioContext;
  if (!A) return null;
  if (!window.__fwAC) { try { window.__fwAC = new A(); } catch (e) { return null; } }
  return window.__fwAC;
}
function fwTone(ac, f, start, dur, opts) {
  opts = opts || {};
  const o = ac.createOscillator(), g = ac.createGain();
  o.connect(g); g.connect(ac.destination);
  o.type = opts.type || 'square';
  o.frequency.setValueAtTime(f, start);
  if (opts.slideTo) o.frequency.exponentialRampToValueAtTime(opts.slideTo, start + dur);
  const peak = opts.gain != null ? opts.gain : 0.16;
  g.gain.setValueAtTime(0.0001, start);
  g.gain.exponentialRampToValueAtTime(peak, start + 0.012);
  g.gain.exponentialRampToValueAtTime(0.0001, start + dur);
  o.start(start); o.stop(start + dur + 0.03);
}

  (rows || []).forEach((h) => {
    const any = h.cardio || h.force || h.mixte || h.sauna || h.bain_froid || h.wim_hof || h.yoga || h.point_faible ||

    if (any && h.date) out[h.date] = true;
  });
  return out;
}

function scoreBackSquat(v, weight) {
  const ratio = v / weight;
  if (ratio < 1.2) return -1;
  if (ratio <= 1.6) return 1;
  return 2;
}

  'Endurance musculaire': 4,
  'Tension artérielle': 5,

// Returns { total, cats:{cat:{pts}} } for one result row.
function calcScoreLive(warrior, result) {
  const tests = LIVE_TESTS[warrior.gender] || LIVE_TESTS.homme;
  let total = 0;
  const cats = {};
  tests.forEach((t) => {
    if (t.id === 'legext' && result.legext_mode === 'backsquat') {
      const raw = parseFloat(result.backsquat);
      if (isNaN(raw)) return;
      const pts = scoreBackSquat(raw, warrior.weight);
      total += pts;
      (cats[t.cat] = cats[t.cat] || { pts: 0 }).pts += pts;
      return;
    }
    const raw = parseFloat(result[t.id]);
    if (isNaN(raw)) return;
    const pts = (t.useWeight || t.useHeight)
      ? t.score(raw, warrior.weight, warrior.height)
      : t.score(raw);
    total += pts;
    (cats[t.cat] = cats[t.cat] || { pts: 0 }).pts += pts;
  });
  const bp = parseFloat(result.bp);
  if (!isNaN(bp)) {
    const bpPts = bp < 120 ? 1 : bp <= 130 ? 0 : -1;
    total += bpPts;
    (cats['Tension artérielle'] = cats['Tension artérielle'] || { pts: 0 }).pts += bpPts;
  }
  return { total, cats };
}

// Category points → 0-100 percentage (production formula).
function catPct(warrior, cat, pts) {
  const tests = LIVE_TESTS[warrior.gender || 'homme'];
  const maxPts = (tests.filter((t) => t.cat === cat).length * 2) + (cat === 'Tension artérielle' ? 1 : 0);
  if (maxPts === 0) return 0;
  return Math.max(0, Math.min(100, ((pts + maxPts) / (maxPts * 2)) * 100));
}

function hydrationTarget(weight) {
  return weight ? Math.round((weight / 23) * 10) / 10 * 1000 : 2500;
}

// Habit points for one row (production formula).
function calcHabitPointsLive(h, weight) {
  const checks = ['cardio', 'force', 'mixte', 'sauna', 'bain_froid', 'wim_hof', 'yoga', 'point_faible'];
  let pts = checks.filter((k) => h[k]).length;
  pts += (h.douches_froides || 0) * 0.2;
  if (h.hydration_ml > 0 && h.hydration_ml >= hydrationTarget(weight)) pts += 1;
  return pts;
}

function ymOf(iso) {
  return String(iso || '').slice(0, 7); // yyyy-mm
}
function monthLabelFr(ym) {
  const months = ['Janvier', 'Février', 'Mars', 'Avril', 'Mai', 'Juin', 'Juillet', 'Août', 'Septembre', 'Octobre', 'Novembre', 'Décembre'];
  const parts = (ym || '').split('-');
  const mi = parseInt(parts[1], 10) - 1;
  return (months[mi] || '') + ' ' + (parts[0] || '');
}
function prevYm(ym) {
  const a = (ym || '').split('-').map(Number);
  const d = new Date(a[0], (a[1] - 1) - 1, 1);
  return d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2, '0');
}
function stripHtml(s) {
  return String(s || '').replace(/<[^>]*>/g, '').replace(/\s+/g, ' ').trim();
}

// Build the 6-axis radar array (0-100) for a result.
function resultToStats(warrior, result) {
  const { cats } = calcScoreLive(warrior, result);
  const stats = [0, 0, 0, 0, 0, 0];
  Object.entries(cats).forEach(([cat, data]) => {
    const idx = CAT_TO_AXIS[cat];
    if (idx != null) stats[idx] = Math.round(catPct(warrior, cat, data.pts));
  });
  return stats;
}

// Which of the 6 axes actually have a measurement in this result.
function resultPresence(warrior, result) {
  const { cats } = calcScoreLive(warrior, result);
  const present = [false, false, false, false, false, false];
  Object.keys(cats).forEach((cat) => {
    const idx = CAT_TO_AXIS[cat];
    if (idx != null) present[idx] = true;
  });
  return present;
}

// ─── Main loader ───────────────────────────────────────────────────────
// Returns an array shaped like the mock WARRIORS:
//   { id, name, gender, rank, stats[6], prev[6], histByCat[6][], habits,
//     latestDate, prevDate, challengeRank, challengeName }
async function loadLiveWarriors() {
  const [warriors, results, habits, challenges, challengeResults, feed, bodyProfiles, bodyEntries, feedReactions] = await Promise.all([
    sbFetch('warriors?order=name'),
    sbFetch('results?order=date.desc'),
    sbFetch('habits?order=date.desc').catch(() => []),
    sbFetch('challenges?order=id.desc').catch(() => []),
    sbFetch('challenge_results?order=value.desc').catch(() => []),
    sbFetch('feed?order=created_at.desc&limit=24').catch(() => []),
    sbFetch('body_profiles?order=created_at.asc').catch(() => []),
    sbFetch('body_entries?order=entry_date.asc').catch(() => []),
    sbFetch('feed_reactions?order=created_at.desc').catch(() => []),
  ]);

  // Current-month challenge (id pattern ch_YYYY_MM), else most recent
  const now = new Date();
  const curChId = 'ch_' + now.getFullYear() + '_' + String(now.getMonth() + 1).padStart(2, '0');
  const latestChallenge =
    (challenges || []).find((c) => c.id === curChId) ||
    (challenges || [])[0] || null;
  let challengeRankById = {};
  if (latestChallenge) {
    const rows = (challengeResults || [])
      .filter((r) => r.challenge_id === latestChallenge.id)
      .sort((a, b) => (b.value || 0) - (a.value || 0));
    rows.forEach((r, i) => { challengeRankById[r.warrior_id] = i + 1; });
  }

  // Habits: distinct days with any logged activity over the trailing 30 days
  const horizon = new Date(now.getTime() - 30 * 86400000);
  const habitDays = {};
  (habits || []).forEach((h) => {
    if (!h.date) return;
    const d = new Date(h.date);
    if (isNaN(d) || d < horizon || d > now) return;
    const any = h.cardio || h.force || h.mixte || h.sauna || h.bain_froid ||
      h.wim_hof || h.yoga || h.point_faible ||
      (h.douches_froides && h.douches_froides > 0) ||
      (h.hydration_ml && h.hydration_ml > 0);
    if (!any) return;
    (habitDays[h.warrior_id] = habitDays[h.warrior_id] || new Set()).add(h.date);
  });

  // Map results by warrior, normalized field names (results table already
  // uses snake_case columns; warrior_id links them).
  const resultsByWarrior = {};
  (results || []).forEach((r) => {
    (resultsByWarrior[r.warrior_id] = resultsByWarrior[r.warrior_id] || []).push(r);
  });

  // Weight lookup for hydration target
  const weightById = {};
  (warriors || []).forEach((w) => { weightById[w.id] = w.weight; });

  // Active habit month = month of the most recent habit row (so podiums show
  // real data even if the current calendar month is empty).
  const habitMonths = (habits || []).map((h) => ymOf(h.date)).filter(Boolean).sort();
  const activeYm = habitMonths.length ? habitMonths[habitMonths.length - 1] : ymOf(now.toISOString());
  const prevActiveYm = prevYm(activeYm);

  // Habit points per warrior for a given month
  function habitAgg(ym) {
    const byW = {};
    (habits || []).forEach((h) => {
      if (ymOf(h.date) !== ym) return;
      const rec = (byW[h.warrior_id] = byW[h.warrior_id] || { pts: 0, days: new Set() });
      rec.pts += calcHabitPointsLive(h, weightById[h.warrior_id]);
      rec.days.add(h.date);
    });
    return byW;
  }
  const monthAgg = habitAgg(activeYm);
  const prevMonthAgg = habitAgg(prevActiveYm);

  // ISO week key (yyyy-Www) for a date
  function isoWeek(dateStr) {
    const d = new Date(dateStr);
    if (isNaN(d)) return null;
    const t = new Date(Date.UTC(d.getFullYear(), d.getMonth(), d.getDate()));
    const day = t.getUTCDay() || 7;
    t.setUTCDate(t.getUTCDate() + 4 - day);
    const yearStart = new Date(Date.UTC(t.getUTCFullYear(), 0, 1));
    const wk = Math.ceil((((t - yearStart) / 86400000) + 1) / 7);
    return t.getUTCFullYear() + '-W' + String(wk).padStart(2, '0');
  }
  // Active week = week of most recent habit row
  const habitWeeks = (habits || []).map((h) => isoWeek(h.date)).filter(Boolean).sort();
  const activeWk = habitWeeks.length ? habitWeeks[habitWeeks.length - 1] : isoWeek(now.toISOString());
  function habitAggWeek(wk) {
    const byW = {};
    (habits || []).forEach((h) => {
      if (isoWeek(h.date) !== wk) return;
      const rec = (byW[h.warrior_id] = byW[h.warrior_id] || { pts: 0, days: new Set() });
      rec.pts += calcHabitPointsLive(h, weightById[h.warrior_id]);
      rec.days.add(h.date);
    });
    return byW;
  }
  const weekAgg = habitAggWeek(activeWk);
  // Previous ISO week (for « anciens gagnants »)
  function prevIsoWeek(wk) {
    const m = (wk || '').match(/(\d{4})-W(\d{2})/);
    if (!m) return null;
    const year = +m[1], week = +m[2];
    const simple = new Date(Date.UTC(year, 0, 1 + (week - 1) * 7));
    const dow = simple.getUTCDay() || 7;
    const monday = new Date(simple);
    monday.setUTCDate(simple.getUTCDate() - dow + 1 - 7);
    const iso = monday.getUTCFullYear() + '-' + String(monday.getUTCMonth() + 1).padStart(2, '0') + '-' + String(monday.getUTCDate()).padStart(2, '0');
    return isoWeek(iso);
  }
  const prevWk = prevIsoWeek(activeWk);
  const prevWeekAgg = prevWk ? habitAggWeek(prevWk) : {};

  const built = (warriors || []).map((w) => {
    const warrior = { gender: w.gender || 'homme', weight: w.weight, height: w.height };
    const rs = (resultsByWarrior[w.id] || []).slice().sort((a, b) => String(b.date).localeCompare(String(a.date)));
    const latest = rs[0] || null;
    const prev = rs[1] || null;
    const stats = latest ? resultToStats(warrior, latest) : [0, 0, 0, 0, 0, 0];
    const prevStats = prev ? resultToStats(warrior, prev) : stats;
    const present = latest ? resultPresence(warrior, latest) : [false, false, false, false, false, false];
    const prevPresent = prev ? resultPresence(warrior, prev) : present;

    // Per-axis history (chronological asc), one point per test session
    const chrono = rs.slice().reverse();
    const histByCat = [0, 1, 2, 3, 4, 5].map((axis) =>
      chrono.map((r) => resultToStats(warrior, r)[axis])
    );

    const { total } = latest ? calcScoreLive(warrior, latest) : { total: -999 };
    const monthRec = monthAgg[w.id];

    // Best raw value per test across all sessions (min for bp, max otherwise)
    const raw = {};
    const RAW_FIELDS = ['grip_g', 'grip_d', 'deadhang', 'legext', 'backsquat', 'wimhof', 'vo2max', 'broadjump', 'pushups', 'plank_f', 'plank_s'];
    RAW_FIELDS.forEach((f) => {
      const vals = rs.map((r) => parseFloat(r[f])).filter((v) => !isNaN(v));
      if (vals.length) raw[f] = Math.max.apply(null, vals);
    });
    const bpVals = rs.map((r) => parseFloat(r.bp)).filter((v) => !isNaN(v));
    if (bpVals.length) raw.bp = Math.min.apply(null, bpVals);
    if (raw.grip_g != null || raw.grip_d != null) raw.grip = Math.max(raw.grip_g || 0, raw.grip_d || 0);

    return {
      id: w.id,
      name: w.name || '—',
      gender: warrior.gender,
      weight: w.weight,
      height: w.height,
      stats,
      prev: prevStats,
      present,
      prevPresent,
      hasPrev: !!prev,
      raw,
      histByCat: histByCat.map((h) => (h.length >= 2 ? h : null)),
      habits: habitDays[w.id] ? habitDays[w.id].size : 0,
      habitPtsMonth: monthRec ? Math.round(monthRec.pts * 10) / 10 : 0,
      habitDaysMonth: monthRec ? monthRec.days.size : 0,
      hasData: !!latest,
      total,
      animal: latest ? getAnimal(total) : null,
      nextAnimal: latest ? nextAnimal(total) : null,
      latestDate: latest ? latest.date : null,
      prevDate: prev ? prev.date : null,
      challengeRank: challengeRankById[w.id] || null,
      challengeName: latestChallenge ? (latestChallenge.title || latestChallenge.name || 'Challenge') : null,
    };
  });

  // Rank by total score (warriors with data first), mirror leaderboard
  const withData = built.filter((b) => b.hasData).sort((a, b) => b.total - a.total);
  withData.forEach((b, i) => { b.rank = i + 1; });
  const without = built.filter((b) => !b.hasData);
  without.forEach((b) => { b.rank = withData.length + 1; });

  // Team average per axis over warriors that have data
  const teamAvg = [0, 1, 2, 3, 4, 5].map((axis) => {
    const vals = withData.map((b) => b.stats[axis]).filter((v) => v > 0);
    return vals.length ? Math.round(vals.reduce((s, v) => s + v, 0) / vals.length) : 0;
  });

  const ordered = [...withData, ...without];
  ordered._teamAvg = teamAvg;

  // ─── Meta: leaderboards, winners, challenge, feed ───────────────────
  const byId = {};
  ordered.forEach((w) => { byId[w.id] = w; });

  // Habits leaderboard (active month) — pts desc
  const habitsMonthLb = ordered
    .map((w) => ({ w, pts: w.habitPtsMonth, days: w.habitDaysMonth }))
    .filter((e) => e.pts > 0)
    .sort((a, b) => b.pts - a.pts);

  // Previous-month habits winner
  const prevPairs = Object.entries(prevMonthAgg)
    .map(([id, rec]) => ({ w: byId[id], pts: Math.round(rec.pts * 10) / 10, days: rec.days.size }))
    .filter((e) => e.w && e.pts > 0)
    .sort((a, b) => b.pts - a.pts);
  const habitsPrevWinner = prevPairs[0] || null;

  // Habits leaderboard (active week)
  const habitsWeekLb = Object.entries(weekAgg)
    .map(([id, rec]) => ({ w: byId[id], pts: Math.round(rec.pts * 10) / 10, days: rec.days.size }))
    .filter((e) => e.w && e.pts > 0)
    .sort((a, b) => b.pts - a.pts);
  // Previous-week habits winner (for « anciens gagnants »)
  const habitsPrevWeekLb = Object.entries(prevWeekAgg)
    .map(([id, rec]) => ({ w: byId[id], pts: Math.round(rec.pts * 10) / 10, days: rec.days.size }))
    .filter((e) => e.w && e.pts > 0)
    .sort((a, b) => b.pts - a.pts);
  const habitsPrevWeekWinner = habitsPrevWeekLb[0] || null;
  // Readable week range label (Mon–Sun) for the active ISO week
  function weekLabel(wk) {
    if (!wk) return '';
    const m = wk.match(/(\d{4})-W(\d{2})/);
    if (!m) return '';
    const year = +m[1], week = +m[2];
    const simple = new Date(Date.UTC(year, 0, 1 + (week - 1) * 7));
    const dow = simple.getUTCDay() || 7;
    const monday = new Date(simple);
    monday.setUTCDate(simple.getUTCDate() - dow + 1);
    const sunday = new Date(monday);
    sunday.setUTCDate(monday.getUTCDate() + 6);
    const fmt = (d) => d.getUTCDate() + ' ' + ['jan','fév','mar','avr','mai','juin','juil','aoû','sep','oct','nov','déc'][d.getUTCMonth()];
    return fmt(monday) + ' – ' + fmt(sunday);
  }

  // Challenge leaderboard for the latest challenge
  let challengeLb = [];
  if (latestChallenge) {
    const order = latestChallenge.sort_order || 'desc';
    const best = {};
    (challengeResults || []).forEach((r) => {
      if (r.challenge_id !== latestChallenge.id) return;
      if (!best[r.warrior_id] || (order === 'desc' ? r.value > best[r.warrior_id].value : r.value < best[r.warrior_id].value)) {
        best[r.warrior_id] = r;
      }
    });
    challengeLb = Object.values(best)
      .map((r) => ({ w: byId[r.warrior_id], value: r.value }))
      .filter((e) => e.w)
      .sort((a, b) => (order === 'desc' ? b.value - a.value : a.value - b.value));
  }

  // Previous challenge (the one just before the active/most recent) + its winner
  let prevChallengeWinner = null, prevChallengeTitle = null, prevChallengeUnit = '';
  if (latestChallenge) {
    const idx = (challenges || []).findIndex((c) => c.id === latestChallenge.id);
    const prevCh = idx >= 0 ? (challenges || [])[idx + 1] : (challenges || [])[1];
    if (prevCh) {
      const order = prevCh.sort_order || 'desc';
      const best = {};
      (challengeResults || []).forEach((r) => {
        if (r.challenge_id !== prevCh.id) return;
        if (!best[r.warrior_id] || (order === 'desc' ? r.value > best[r.warrior_id].value : r.value < best[r.warrior_id].value)) best[r.warrior_id] = r;
      });
      const lb = Object.values(best)
        .map((r) => ({ w: byId[r.warrior_id], value: r.value }))
        .filter((e) => e.w)
        .sort((a, b) => (order === 'desc' ? b.value - a.value : a.value - b.value));
      prevChallengeWinner = lb[0] || null;
      prevChallengeTitle = prevCh.title || prevCh.name || 'Challenge';
      prevChallengeUnit = prevCh.unit || '';
    }
  }

  // Activity feed (strip HTML from messages)
  const reactionsByFeed = {};
  (feedReactions || []).forEach((r) => {
    if (!r.feed_id) return;
    const w = byId[r.warrior_id];
    (reactionsByFeed[r.feed_id] = reactionsByFeed[r.feed_id] || []).push({
      id: r.id,
      warriorId: r.warrior_id,
      warriorName: r.warrior_name || (w && w.name) || 'Guerrier',
      type: r.reaction_type,
      animal: w && w.animal ? w.animal : null,
      createdAt: r.created_at || null,
    });
  });

  const feedItems = (feed || []).slice(0, 24).map((f) => ({
    id: f.id,
    type: f.type,
    message: stripHtml(f.message),
    details: f.details ? stripHtml(f.details) : null,
    warriorId: f.warrior_id || null,
    warriorName: f.warrior_id && byId[f.warrior_id] ? byId[f.warrior_id].name : null,
    createdAt: f.created_at || null,
    reactions: reactionsByFeed[f.id] || [],
  })).filter((f) => f.message);

  // Body tracking: profile + entries per warrior
  const bodyProfById = {};
  (bodyProfiles || []).forEach((p) => { bodyProfById[p.warrior_id] = p; });
  const bodyEntriesById = {};
  (bodyEntries || []).forEach((e) => {
    (bodyEntriesById[e.warrior_id] = bodyEntriesById[e.warrior_id] || []).push(e);
  });
  const bodyList = [];
  Object.keys(bodyProfById).forEach((wid) => {
    const w = byId[wid];
    if (!w) return;
    const p = bodyProfById[wid];
    const entries = (bodyEntriesById[wid] || []).slice().sort((a, b) => String(a.entry_date).localeCompare(String(b.entry_date)));
    const latest = entries.length ? entries[entries.length - 1] : null;
    const start = p.start_weight != null ? p.start_weight : (entries[0] ? entries[0].weight : null);
    const target = p.target_weight;
    const current = latest ? latest.weight : start;
    let pct = 0;
    if (start != null && target != null && current != null && Math.abs(target - start) > 0.001) {
      pct = Math.max(0, Math.min(100, ((start - current) / (start - target)) * 100));
    }
    bodyList.push({
      w, goalType: p.goal_type || 'recompo',
      start, target, current,
      pct: Math.round(pct),
      weeklyPace: p.weekly_pace != null ? p.weekly_pace : null, // grams/week target
      paceRange: p.pace_range != null ? p.pace_range : null,    // grams tolerance
      lastDate: latest ? latest.entry_date : null,
      entries: entries.map((e) => ({
        id: e.id,
        date: e.entry_date,
        weight: e.weight,
        sportHours: e.sport_hours != null ? e.sport_hours : null,
        avgSteps: e.avg_steps != null ? e.avg_steps : null,
        energy: e.energy_score != null ? e.energy_score : null,
        cravings: e.food_cravings_score != null ? e.food_cravings_score : null,
        motivation: e.motivation_score != null ? e.motivation_score : null,
      })),
      visibility: p.visibility || 'public',
    });
  });
  bodyList.sort((a, b) => b.pct - a.pct);

  // Group challenge ("Beach Body") — total kg to lose/gain across members
  let gTotalToLose = 0, gTotalProgress = 0, gMembers = 0;
  bodyList.forEach((b) => {
    if (b.start == null || b.target == null) return;
    const toGo = Math.abs(b.target - b.start);
    if (toGo <= 0) return;
    gTotalToLose += toGo;
    gMembers++;
    if (b.current != null) {
      const delta = b.goalType === 'prise' ? (b.current - b.start) : (b.start - b.current);
      gTotalProgress += Math.max(0, delta);
    }
  });
  const gPct = gTotalToLose > 0 ? Math.min(100, (gTotalProgress / gTotalToLose) * 100) : 0;
  const groupChallenge = {
    totalToLose: Math.round(gTotalToLose * 10) / 10,
    totalProgress: Math.round(gTotalProgress * 10) / 10,
    pct: Math.round(gPct),
    memberCount: gMembers,
    milestones: [
      { pct: 25, emoji: '🍽️', label: 'Restaurant', desc: 'Restaurant tous ensemble' },
      { pct: 50, emoji: '🧊', label: 'Soirée H5', desc: 'Bains froids · sauna · sumo fight' },
      { pct: 75, emoji: '🌲', label: 'Rochehaut', desc: 'Balade en forêt · brasserie terroir' },
      { pct: 100, emoji: '🏖️', label: 'Beach Body', desc: 'Objectif collectif atteint !' },
    ],
  };

  ordered._meta = {
    activeMonthLabel: monthLabelFr(activeYm),
    prevMonthLabel: monthLabelFr(prevActiveYm),
    habitsMonthLb,
    habitsWeekLb,
    weekLabel: weekLabel(activeWk),
    prevWeekLabel: prevWk ? weekLabel(prevWk) : '',
    habitsPrevWinner,
    habitsPrevWeekWinner,
    prevChallengeWinner,
    prevChallengeTitle,
    prevChallengeUnit,
    challengeWinner: challengeLb[0] || null,
    challenge: latestChallenge ? {
      id: latestChallenge.id,
      title: latestChallenge.title || latestChallenge.name || 'Challenge',
      description: latestChallenge.description || '',
      unit: latestChallenge.unit || '',
      sortOrder: latestChallenge.sort_order || 'desc',
      leaderboard: challengeLb,
    } : null,
    feed: feedItems,
    teamAvg,
    habitDefs: HABIT_DEFS,
    body: bodyList,
    groupChallenge,
    rankTests: RANK_TESTS,
  };
  return ordered;
}

Object.assign(window, {
  loadLiveWarriors, SUPABASE_URL,
  ANIMALS, getAnimal, nextAnimal, HABIT_DEFS, calcHabitPointsLive, hydrationTarget,
  TEST_META, CAT_ORDER, CAT_TO_AXIS, RANK_TESTS,

  writeReactionLive, writeFeedLive,
  avgPaceKg, bodyPaceColor, lastWeekDeltaKg, projectionDate, playBodySound, playHabitSound,
  saveBodyEntryLive, deleteBodyEntryLive, createWarriorLive,
});

// ─── Data hook ─────────────────────────────────────────────────────────
function useAppData() {
  const [s, setS] = React.useState({ status: 'loading', list: null });
  const load = React.useCallback((silent) => {
    if (!silent) setS((p) => (p.list ? p : { status: 'loading', list: null }));
    loadLiveWarriors()
      .then((list) => setS({ status: list && list.length ? 'ok' : 'empty', list }))
      .catch((e) => setS((p) => (p.list ? p : { status: 'error', list: null, error: String(e.message || e) })));
  }, []);
  React.useEffect(() => { load(); }, [load]);
  return { status: s.status, list: s.list, reload: () => load(true) };
}

// ─── Mini hex radar (used by Classement / Roster cards) ────────────────
function MiniHex({ values, accent = T.accent, size = 56 }) {
  const hp = window.hexPoint || ((i, r, cx, cy) => { const a = (Math.PI * 2 / 6) * i - Math.PI / 2; return [cx + Math.cos(a) * r, cy + Math.sin(a) * r]; });
  const cx = size / 2, cy = size / 2, r = size * 0.38;
  const vals = (values && values.length === 6) ? values : [0, 0, 0, 0, 0, 0];
  const pts = vals.map((v, i) => hp(i, r * Math.max(8, v || 0) / 100, cx, cy));
  const ring = Array.from({ length: 6 }, (_, i) => hp(i, r, cx, cy));
  return (
    <svg width={size} height={size} viewBox={`0 0 ${size} ${size}`}>
      <polygon points={ring.map((p) => p.join(',')).join(' ')}
        fill="none" stroke={T.inkLow} strokeOpacity={0.5} strokeWidth={1} strokeDasharray="2 2" />
      <polygon points={pts.map((p) => p.join(',')).join(' ')}
        fill={accent} fillOpacity={0.2} stroke={accent} strokeWidth={1.4} strokeLinejoin="round" />
    </svg>
  );
}

            <SectionTitle>Fil d'activité</SectionTitle>
            <div style={{ display: 'flex', flexDirection: 'column', gap: 8 }}>

              ))}
            </div>
          </div>
        )}
      </div>
    </>
  );
}

// ════════════════════════════════════════════════════════════════════════
// HABITUDES
// ════════════════════════════════════════════════════════════════════════
function HabitsScreen({ me, warriors, meta, accent, onProfile, reload }) {
  const { AppBar, Card, Eyebrow, SectionTitle, HABIT_DEFS } = window;
  const defs = (meta && meta.habitDefs) || window.HABIT_DEFS || [];
  // Local interactive encode state
  const [checked, setChecked] = React.useState({});
  const [showers, setShowers] = React.useState(0);
  const [hydro, setHydro] = React.useState(0);
  const [encDate, setEncDate] = React.useState(window.todayISO());
  const [lbScope, setLbScope] = React.useState('week');
  const [state, setState] = React.useState({ phase: 'idle', msg: '' });
  const [celebrate, setCelebrate] = React.useState(null);
  const target = window.hydrationTarget ? window.hydrationTarget(me.weight) : 2500;

  // ── Week strip data (real, clickable) ──────────────────────────────
  const contentRef = React.useRef(null);
  const localISO = (d) => d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2, '0') + '-' + String(d.getDate()).padStart(2, '0');
  const weekDates = React.useMemo(() => {
    const now = new Date();
    const dow = (now.getDay() + 6) % 7; // 0 = lundi
    const monday = new Date(now); monday.setDate(now.getDate() - dow);
    return Array.from({ length: 7 }, (_, i) => { const d = new Date(monday); d.setDate(monday.getDate() + i); return localISO(d); });
  }, []);
  const [weekDone, setWeekDone] = React.useState({});
  const fetchWeek = React.useCallback(() => {
    if (!window.loadHabitRangeLive) return;
    window.loadHabitRangeLive(me.id, weekDates[0], weekDates[6]).then((s) => setWeekDone(s || {})).catch(() => {});
  }, [me.id, weekDates]);
  React.useEffect(() => { fetchWeek(); }, [fetchWeek]);
  // Préremplir le formulaire avec les habitudes DÉJÀ enregistrées pour aujourd'hui
  // (au montage / changement de guerrier) — sinon à la réouverture l'écran semble vide.
  React.useEffect(() => {
    let alive = true;
    (async () => {
      try {
        const d = window.loadHabitDayLive ? await window.loadHabitDayLive(me.id, window.todayISO()) : null;
        if (!alive || !d) return;
        setChecked(d.checks || {}); setShowers(d.showers || 0); setHydro(d.hydrationMl || 0);
      } catch (e) {}
    })();
    return () => { alive = false; };
  }, [me.id]);
  // Pick a date: load its saved habits into the form (observe / edit), optionally scroll up.
  const loadForDate = async (iso, scroll) => {
    setEncDate(iso); setState({ phase: 'idle', msg: '' });
    try {
      const d = window.loadHabitDayLive ? await window.loadHabitDayLive(me.id, iso) : null;
      if (d) { setChecked(d.checks || {}); setShowers(d.showers || 0); setHydro(d.hydrationMl || 0); }
      else { setChecked({}); setShowers(0); setHydro(0); }
    } catch (e) {}
    if (scroll) { try { const sc = contentRef.current && contentRef.current.closest('.app-scroll'); if (sc) sc.scrollTo({ top: 0, behavior: 'smooth' }); } catch (e) {} }
  };

  const todayIso = window.todayISO();
  const isToday = encDate === todayIso;
  const dateLabelFr = (() => {
    const d = new Date(encDate + 'T00:00:00');
    if (isNaN(d)) return encDate;
    return d.toLocaleDateString('fr-FR', { weekday: 'long', day: 'numeric', month: 'long' });
  })();

  const basePts = Object.values(checked).filter(Boolean).length;
  const pts = Math.round((basePts + showers * 0.2 + (hydro >= target ? 1 : 0)) * 10) / 10;

  const toggle = (k) => {
    setChecked((c) => {
      const next = { ...c, [k]: !c[k] };
      try { window.playHabitSound && window.playHabitSound(next[k] ? 'coin' : 'off'); } catch (e) {}
      return next;
    });
    setState({ phase: 'idle', msg: '' });
  };

  const doSave = async () => {
    if (state.phase === 'saving') return;
    setState({ phase: 'saving', msg: '' });
    try {
      await window.saveHabitsLive({ warriorId: me.id, date: encDate, checks: checked, showers, hydrationMl: hydro });
      setState({ phase: 'ok', msg: `Habitudes enregistrées (${isToday ? 'aujourd\u2019hui' : dateLabelFr}) ✓` });
      try { window.playHabitSound && window.playHabitSound('save'); } catch (e2) {}
      // Feed: chaque encodage d'habitude publie un message (id déterministe → anti-doublon par jour)
      try {
        if (window.writeFeedLive) {
          const labels = (defs || []).filter((h) => checked[h.key]).map((h) => h.label);
          if (showers > 0) labels.push(showers + '× douche froide');
          if (target > 0 && hydro >= target) labels.push('hydratation ✓');
          const summary = labels.length ? labels.slice(0, 5).join(' · ') + (labels.length > 5 ? '…' : '') : 'séance encodée';
          const dayTxt = isToday ? 'aujourd\u2019hui' : dateLabelFr;
          window.writeFeedLive({
            id: 'fd_habit_' + me.id + '_' + encDate,
            type: 'habit_entry', warriorId: me.id,
            message: me.name + ' a encodé ses habitudes (' + dayTxt + ') · ' + pts + ' pts — ' + summary,
          });
        }
      } catch (e3) {}
      setCelebrate({ pts });
      if (reload) reload();
      fetchWeek();
    } catch (e) {
      setState({ phase: 'err', msg: 'Erreur : ' + (e.message || e) });
    }
  };

  // Week strip (7 days, demo completion from me's recent activity)
  const days = ['L', 'M', 'M', 'J', 'V', 'S', 'D'];
  const todayIdx = (new Date().getDay() + 6) % 7;

  return (
    <>
      <AppBar title="Habitudes" sub="Encoder ma journée" me={me} onProfile={onProfile} />
      <div ref={contentRef} style={{ padding: '4px 14px', display: 'flex', flexDirection: 'column', gap: 14 }}>

        {/* Today encode */}
        <Card style={{ padding: 14 }}>
          <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'baseline', marginBottom: 10 }}>
            <Eyebrow>{isToday ? 'Aujourd’hui' : 'Journée encodée'}</Eyebrow>
            <span style={{ fontFamily: SFM, fontSize: 15, fontWeight: 700, color: accent }}>{pts} <span style={{ fontSize: 9, color: ST.inkLow }}>pts</span></span>
          </div>
          {/* Date selector */}
          <div style={{ display: 'flex', alignItems: 'center', gap: 8, marginBottom: 12, padding: '8px 10px', borderRadius: 11, background: ST.inkXLow, border: isToday ? '1px solid transparent' : `1px solid ${accent}55` }}>
            <span style={{ fontSize: 14 }}>📅</span>
            <span style={{ flex: 1, fontFamily: SFT, fontSize: 12, color: ST.ink, textTransform: 'capitalize' }}>{dateLabelFr}</span>
            <input type="date" value={encDate} max={todayIso}
              onChange={(e) => { if (e.target.value) loadForDate(e.target.value); }}
              style={{ background: ST.bg0, border: `1px solid ${ST.inkXLow}`, borderRadius: 8, color: accent, fontFamily: SFM, fontSize: 11, padding: '4px 6px', colorScheme: 'dark' }} />
            {!isToday && <button onClick={() => loadForDate(todayIso)} style={{ background: 'none', border: 'none', color: ST.inkLow, fontFamily: SFM, fontSize: 9.5, cursor: 'pointer', whiteSpace: 'nowrap' }}>auj.</button>}
          </div>
          <div style={{ display: 'grid', gridTemplateColumns: 'minmax(0,1fr) minmax(0,1fr)', gap: 8 }}>
            {defs.map((h) => {
              const on = !!checked[h.key];
              return (
                <button key={h.key} onClick={() => toggle(h.key)} style={{
                  display: 'flex', alignItems: 'center', gap: 9, cursor: 'pointer', position: 'relative',
                  padding: '9px 10px', borderRadius: 13, textAlign: 'left',
                  background: on ? `linear-gradient(155deg, ${accent}2e, ${accent}12)` : `linear-gradient(160deg, ${ST.bg2}, ${ST.bg1})`,
                  border: `1px solid ${on ? accent : ST.inkXLow}`,
                  boxShadow: on
                    ? `0 0 0 1px ${accent}44, 0 6px 16px ${accent}26`
                    : 'inset 0 1px 0 rgba(255,255,255,0.045), 0 2px 6px rgba(0,0,0,0.28)',
                  color: ST.ink, transition: 'all 0.18s ease',
                }}>
                  <span style={{
                    width: 30, height: 30, borderRadius: 9, flexShrink: 0, display: 'grid', placeItems: 'center', fontSize: 16,
                    background: on ? `${accent}26` : ST.bg0,
                    border: `1px solid ${on ? accent + '55' : ST.inkXLow}`,
                    boxShadow: on ? `0 0 10px ${accent}55` : 'none',
                  }}>{h.emoji}</span>
                  <span style={{ flex: 1, fontFamily: SFT, fontSize: 11.5, fontWeight: 600, lineHeight: 1.12, color: on ? ST.ink : ST.inkDim }}>{h.label}</span>
                  <span style={{
                    width: 17, height: 17, borderRadius: '50%', flexShrink: 0, display: 'grid', placeItems: 'center',
                    fontSize: 11, fontWeight: 700, lineHeight: 1,
                    background: on ? accent : 'transparent',
                    border: `1.5px solid ${on ? accent : ST.inkLow}`, color: ST.bg0,
                    transition: 'all 0.18s ease',
                  }}>{on ? '✓' : ''}</span>
                </button>
              );
            })}
          </div>

          {/* Cold showers + hydration */}
          <div style={{ display: 'flex', gap: 8, marginTop: 10 }}>
            <div style={{ flex: 1, padding: '8px 10px', borderRadius: 11, background: ST.inkXLow, display: 'flex', alignItems: 'center', justifyContent: 'space-between' }}>
              <span style={{ fontFamily: SFT, fontSize: 11, color: ST.inkDim }}>🚿 Douches froides</span>
              <div style={{ display: 'flex', alignItems: 'center', gap: 8 }}>
                <Stepper onMinus={() => setShowers((s) => Math.max(0, s - 1))} onPlus={() => setShowers((s) => s + 1)} accent={accent} />
                <span style={{ fontFamily: SFM, fontSize: 13, fontWeight: 700, color: accent, width: 14, textAlign: 'center' }}>{showers}</span>
              </div>
            </div>
          </div>
          <div style={{ marginTop: 8, padding: '8px 10px', borderRadius: 11, background: ST.inkXLow }}>
            <div style={{ display: 'flex', justifyContent: 'space-between', marginBottom: 6 }}>
              <span style={{ fontFamily: SFT, fontSize: 11, color: ST.inkDim }}>💧 Hydratation</span>
              <span style={{ fontFamily: SFM, fontSize: 10, color: hydro >= target ? accent : ST.inkLow }}>{(hydro / 1000).toFixed(1)} / {(target / 1000).toFixed(1)} L</span>
            </div>
            <div style={{ display: 'flex', gap: 5 }}>
              {[0.25, 0.5, 0.5, 0.75].map((l, i) => (
                <button key={i} onClick={() => setHydro((h) => h + l * 1000)} style={{
                  flex: 1, padding: '5px 0', borderRadius: 8, cursor: 'pointer',
                  border: `1px solid ${accent}33`, background: `${accent}10`, color: accent,
                  fontFamily: SFM, fontSize: 10, fontWeight: 700,
                }}>+{l}L</button>
              ))}
              <button onClick={() => setHydro(0)} style={{ padding: '5px 9px', borderRadius: 8, cursor: 'pointer', border: `1px solid ${ST.inkXLow}`, background: 'transparent', color: ST.inkLow, fontFamily: SFM, fontSize: 10 }}>↺</button>
            </div>
          </div>
          <button onClick={doSave} disabled={state.phase === 'saving'} style={{
            marginTop: 10, width: '100%', padding: '12px', borderRadius: 12,
            cursor: state.phase === 'saving' ? 'wait' : 'pointer', border: 'none',
            background: `linear-gradient(135deg, ${ST.accentBright || accent}, ${accent})`,
            color: ST.bg0, fontFamily: SFT, fontSize: 14, fontWeight: 700,
            boxShadow: `0 4px 16px ${accent}44`, opacity: state.phase === 'saving' ? 0.7 : 1,
          }}>{state.phase === 'saving' ? 'Enregistrement…' : '🔥 Enregistrer ma journée'}</button>
          {state.phase === 'ok' && <div style={{ marginTop: 8, fontFamily: SFM, fontSize: 10, color: ST.good, textAlign: 'center' }}>✅ {state.msg}</div>}
          {state.phase === 'err' && <div style={{ marginTop: 8, fontFamily: SFM, fontSize: 10, color: ST.bad, textAlign: 'center' }}>{state.msg}</div>}
          <div style={{ marginTop: 8, fontFamily: SFM, fontSize: 8.5, color: ST.inkLow, textAlign: 'center', letterSpacing: 0.4 }}>
            écrit dans ta base Supabase · {isToday ? 'date du jour' : 'date choisie'}
          </div>
        </Card>

        {/* Week strip — click a day to view / edit it */}
        <div>
          <SectionTitle>Ma semaine</SectionTitle>
          <Card style={{ padding: '12px 10px' }}>
            <div style={{ display: 'flex', justifyContent: 'space-between' }}>
              {days.map((d, i) => {
                const iso = weekDates[i];
                const done = !!weekDone[iso];
                const isTodayCell = iso === todayIso;
                const isSel = iso === encDate;
                const future = iso > todayIso;
                const dayNum = new Date(iso + 'T00:00:00').getDate();
                return (
                  <button key={i} disabled={future} onClick={() => loadForDate(iso, true)} style={{
                    display: 'flex', flexDirection: 'column', alignItems: 'center', gap: 6,
                    background: 'none', border: 'none', padding: 0,
                    cursor: future ? 'default' : 'pointer', opacity: future ? 0.4 : 1,
                  }}>
                    <div style={{
                      width: 32, height: 32, borderRadius: '50%', display: 'grid', placeItems: 'center',
                      background: done ? `linear-gradient(180deg, ${ST.accentBright || accent}, ${accent})` : ST.inkXLow,
                      border: isSel ? `2px solid ${accent}` : isTodayCell ? `1.5px solid ${accent}88` : '1px solid transparent',
                      boxShadow: done ? `0 0 8px ${accent}66` : isSel ? `0 0 8px ${accent}55` : 'none',
                      fontFamily: SFM, fontSize: 11, fontWeight: 700,
                      color: done ? ST.bg0 : isSel ? accent : ST.inkDim,
                    }}>{done ? '✓' : dayNum}</div>
                    <span style={{ fontFamily: SFM, fontSize: 9, color: (isSel || isTodayCell) ? accent : ST.inkLow }}>{d}</span>
                  </button>
                );
              })}
            </div>
            <div style={{ fontFamily: SFM, fontSize: 9, color: ST.inkLow, textAlign: 'center', marginTop: 9, letterSpacing: 0.3 }}>
              Touche un jour pour l’ouvrir et le modifier ↑
            </div>
          </Card>
        </div>

        {/* Classement habitudes : semaine / mois */}
        {(meta.habitsWeekLb.length > 0 || meta.habitsMonthLb.length > 0) && (() => {
          const lb = lbScope === 'week' ? meta.habitsWeekLb : meta.habitsMonthLb;
          const periodLabel = lbScope === 'week' ? meta.weekLabel : meta.activeMonthLabel;
          return (
          <div style={{ paddingBottom: 6 }}>
            <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', marginBottom: 8 }}>
              <SectionTitle style={{ margin: 0 }}>Classement habitudes</SectionTitle>
              <div style={{ display: 'flex', gap: 0, background: ST.inkXLow, borderRadius: 9, padding: 2 }}>
                {[['week', 'Semaine'], ['month', 'Mois']].map(([v, lbl]) => (
                  <button key={v} onClick={() => setLbScope(v)} style={{
                    padding: '5px 12px', borderRadius: 7, cursor: 'pointer', border: 'none',
                    background: lbScope === v ? accent : 'transparent',
                    color: lbScope === v ? ST.bg0 : ST.inkDim,
                    fontFamily: SFT, fontSize: 11, fontWeight: 700,
                  }}>{lbl}</button>
                ))}
              </div>
            </div>
            <div style={{ fontFamily: SFM, fontSize: 9, color: ST.inkLow, marginBottom: 6, letterSpacing: 0.3 }}>{periodLabel}</div>
            {lb.length === 0 ? (
              <div style={{ fontFamily: SFM, fontSize: 11, color: ST.inkLow, textAlign: 'center', padding: 16 }}>Aucune activité {lbScope === 'week' ? 'cette semaine' : 'ce mois'}.</div>
            ) : (
            <div style={{ display: 'flex', flexDirection: 'column', gap: 6 }}>
              {lb.map((e, i) => {
                const isMe = e.w.id === me.id;
                return (
                  <div key={e.w.id} style={{
                    display: 'flex', alignItems: 'center', gap: 10,
                    padding: '8px 11px', borderRadius: 12,
                    background: isMe ? `${accent}16` : `${ST.bg1}cc`,
                    border: `1px solid ${isMe ? accent + '55' : ST.inkXLow}`,
                  }}>
                    <window.RankPill rank={i + 1} />
                    <window.AnimalBadge animal={e.w.animal} size={30} ring={isMe} />
                    <div style={{ flex: 1, minWidth: 0 }}>
                      <div style={{ fontFamily: SFT, fontSize: 13, fontWeight: 600, color: ST.ink, whiteSpace: 'nowrap', overflow: 'hidden', textOverflow: 'ellipsis' }}>{e.w.name}</div>
                      <div style={{ fontFamily: SFM, fontSize: 9, color: ST.inkLow }}>{e.days} jour{e.days > 1 ? 's' : ''} actif{e.days > 1 ? 's' : ''}</div>
                    </div>
                    <span style={{ fontFamily: SFM, fontSize: 14, fontWeight: 700, color: isMe ? accent : ST.inkDim }}>{e.pts}<span style={{ fontSize: 8.5, color: ST.inkLow, marginLeft: 3 }}>pts</span></span>
                  </div>
                );
              })}
            </div>
            )}
          </div>
          );
        })()}
      </div>

      {celebrate && <HabitCelebration pts={celebrate.pts} accent={accent} onDone={() => setCelebrate(null)} />}
    </>
  );
}

// Fun celebration overlay shown when a day is saved (frost/coin burst + ring + points pop).
function HabitCelebration({ pts, accent, onDone }) {
  React.useEffect(() => { const t = setTimeout(onDone, 1500); return () => clearTimeout(t); }, [onDone]);
  const bits = React.useMemo(() => Array.from({ length: 22 }, (_, i) => {
    const ang = (Math.PI * 2 * i) / 22 + (Math.random() * 0.4 - 0.2);
    const dist = 80 + Math.random() * 130;
    return {
      key: i, dx: Math.cos(ang) * dist, dy: Math.sin(ang) * dist - 30,
      rot: (Math.random() * 2 - 1) * 240, dur: 0.85 + Math.random() * 0.7, delay: Math.random() * 0.12,
      ch: ['❄', '🪙', '✦', '◆'][i % 4], size: 13 + Math.random() * 13, cyan: Math.random() < 0.62,
    };
  }), []);
  return (
    <div onClick={onDone} style={{ position: 'absolute', inset: 0, zIndex: 80, display: 'grid', placeItems: 'center', pointerEvents: 'auto' }}>
      <style>{`
        @keyframes fwCeleBurst { 0%{transform:translate(0,0) scale(.4) rotate(0);opacity:0} 14%{opacity:1} 100%{transform:translate(var(--dx),var(--dy)) scale(1) rotate(var(--rot));opacity:0} }
        @keyframes fwCeleRing { 0%{transform:scale(.2);opacity:0} 18%{opacity:.75} 100%{transform:scale(2.7);opacity:0} }
        @keyframes fwCelePop { 0%{transform:scale(.5);opacity:0} 24%{transform:scale(1.14);opacity:1} 70%{transform:scale(1);opacity:1} 100%{transform:scale(1);opacity:0} }
      `}</style>
      <div style={{ position: 'absolute', width: 120, height: 120, borderRadius: '50%', border: `2px solid ${accent}`, boxShadow: `0 0 30px ${accent}88`, animation: 'fwCeleRing 1.1s ease-out forwards' }} />
      {bits.map((b) => (
        <span key={b.key} style={{
          position: 'absolute', fontSize: b.size, color: b.cyan ? accent : '#eaf6ff',
          ['--dx']: b.dx + 'px', ['--dy']: b.dy + 'px', ['--rot']: b.rot + 'deg',
          textShadow: b.cyan ? `0 0 8px ${accent}` : 'none',
          animation: `fwCeleBurst ${b.dur}s cubic-bezier(.2,.7,.3,1) ${b.delay}s forwards`,
        }}>{b.ch}</span>
      ))}
      <div style={{ position: 'relative', textAlign: 'center', animation: 'fwCelePop 1.5s ease-out forwards' }}>
        <div style={{ fontFamily: SFT, fontSize: 46, fontWeight: 800, color: '#fff', textShadow: `0 0 24px ${accent}` }}>+{pts}<span style={{ fontSize: 19, marginLeft: 4, color: accent }}>pts</span></div>
        <div style={{ fontFamily: SFM, fontSize: 11.5, letterSpacing: 2, color: accent, marginTop: 4, textTransform: 'uppercase' }}>❄️ Journée enregistrée</div>
      </div>
    </div>
  );
}

function Stepper({ onMinus, onPlus, accent }) {
  const btn = {
    width: 22, height: 22, borderRadius: 7, cursor: 'pointer',
    border: `1px solid ${accent}33`, background: `${accent}10`, color: accent,
    fontFamily: SFM, fontSize: 13, fontWeight: 700, display: 'grid', placeItems: 'center', lineHeight: 1,
  };
  return (
    <div style={{ display: 'flex', gap: 5 }}>
      <button onClick={onMinus} style={btn}>−</button>
      <button onClick={onPlus} style={btn}>+</button>
    </div>
  );
}

// ════════════════════════════════════════════════════════════════════════
// PLUS (more menu)
// ════════════════════════════════════════════════════════════════════════
function MoreScreen({ me, warriors, meta, accent, onOpenFiche, onProfile, onOpenSub }) {
  const { AppBar, Card, Eyebrow, SectionTitle, AnimalBadge } = window;
  const items = [
    { icon: '🛡️', label: 'Tous les guerriers', sub: `${warriors.length} membres`, go: 'roster' },

    { icon: '📊', label: 'Classements par test', sub: 'VO2max, grip, plank…', go: 'rankings' },
    { icon: '🧊', label: 'Suivi du corps', sub: 'poids & objectifs', go: 'corps' },
  ];
  return (
    <>
      <AppBar title="Plus" sub="Explorer" me={me} onProfile={onProfile} />
      <div style={{ padding: '4px 14px', display: 'flex', flexDirection: 'column', gap: 14 }}>

        {/* Levels ladder */}
        <div>
          <SectionTitle>Échelle des niveaux</SectionTitle>
          <Card style={{ padding: 14 }}>
            <div style={{ display: 'flex', justifyContent: 'space-between', gap: 4 }}>
              {window.ANIMALS.map((a) => {
                const isMine = me.animal && me.animal.name === a.name;
                return (
                  <div key={a.name} style={{ display: 'flex', flexDirection: 'column', alignItems: 'center', gap: 4, flex: 1 }}>
                    <div style={{
                      width: 34, height: 34, borderRadius: '50%', display: 'grid', placeItems: 'center', fontSize: 17,
                      background: isMine ? `${accent}1f` : ST.inkXLow,
                      border: `1.5px solid ${isMine ? accent : 'transparent'}`,
                      boxShadow: isMine ? `0 0 12px ${accent}66` : 'none',
                      filter: isMine ? 'none' : 'grayscale(0.4)', opacity: isMine ? 1 : 0.8,
                    }}>{a.emoji}</div>
                    <span style={{ fontFamily: SFM, fontSize: 7.5, color: isMine ? accent : ST.inkLow, letterSpacing: 0.3, textAlign: 'center' }}>{a.name}</span>
                  </div>
                );
              })}
            </div>
            <div style={{ marginTop: 10, fontFamily: SFM, fontSize: 9.5, color: ST.inkDim, textAlign: 'center' }}>
              Tu es <span style={{ color: accent, fontWeight: 700 }}>{me.animal ? me.animal.emoji + ' ' + me.animal.name : '—'}</span>{me.nextAnimal ? ` · ${me.nextAnimal.min - me.total} pts pour ${me.nextAnimal.emoji}` : ' · niveau max !'}
            </div>
          </Card>
        </div>

        {/* Menu */}
        <div style={{ display: 'flex', flexDirection: 'column', gap: 8, paddingBottom: 6 }}>
          {items.map((it) => (
            <div key={it.label} onClick={() => !it.soon && onOpenSub && onOpenSub(it.go)} style={{
              display: 'flex', alignItems: 'center', gap: 12, padding: '13px 14px',
              borderRadius: 14, background: `${ST.bg1}cc`, border: `1px solid ${it.soon ? ST.inkXLow : accent + '2a'}`,
              cursor: it.soon ? 'default' : 'pointer', opacity: it.soon ? 0.82 : 1,
            }}>
              <div style={{ fontSize: 20 }}>{it.icon}</div>
              <div style={{ flex: 1 }}>
                <div style={{ fontFamily: SFT, fontSize: 14, fontWeight: 600, color: ST.ink }}>{it.label}</div>
                <div style={{ fontFamily: SFM, fontSize: 9.5, color: ST.inkLow, marginTop: 1, whiteSpace: 'nowrap', overflow: 'hidden', textOverflow: 'ellipsis' }}>{it.sub}</div>
              </div>
              {it.soon
                ? <span style={{ fontFamily: SFM, fontSize: 8, color: ST.inkLow, padding: '2px 7px', borderRadius: 99, border: `1px solid ${ST.inkXLow}`, letterSpacing: 0.5 }}>BIENTÔT</span>
                : <span style={{ color: accent, fontSize: 18 }}>›</span>}
            </div>
          ))}
        </div>
      </div>
    </>
  );
}

Object.assign(window, {
  DashboardScreen, ClassementScreen, HabitsScreen, MoreScreen, Podium, WinnerCard,
});
