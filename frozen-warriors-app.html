// ─── Balance qui se remplit (group challenge gauge) ────────────────────
function GaugeBalance({ gc, accent }) {
  const T = window.APP_T;
  const pct = Math.max(0, Math.min(100, gc.pct));
  const visPct = Math.max(pct, 3); // sliver of liquid even at 0%

  // Top-down bathroom-scale platform
  const px = 26, py = 18, pw = 188, ph = 196, prx = 34;
  const bottom = py + ph, cx = px + pw / 2;
  const level = bottom - (visPct / 100) * ph;
  const lambda = 50, amp = 5;

  const wavePath = (yShift) => {
    const x0 = px - 2 * lambda, xEnd = px + pw + 2 * lambda;
    const y = level + yShift;
    let d = `M ${x0} ${y}`;
    let x = x0, up = true;
    while (x < xEnd) { d += ` q ${lambda / 4} ${up ? -amp : amp} ${lambda / 2} 0`; x += lambda / 2; up = !up; }
    d += ` L ${xEnd} ${bottom} L ${x0} ${bottom} Z`;
    return d;
  };

  // Display window (where you read your weight) — top centre
  const dispW = 132, dispH = 50, dispX = cx - dispW / 2, dispY = py + 16;
  // Foot pads (lower area)
  const padW = 62, padH = 96, padY = bottom - padH - 16;

  return (
    <svg viewBox="0 0 258 244" width="100%" style={{ display: 'block', overflow: 'hidden', maxHeight: 252 }}>
      <defs>
        <clipPath id="balClip"><rect x={px} y={py} width={pw} height={ph} rx={prx} /></clipPath>
        <linearGradient id="balLiquid" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stopColor={T.accentBright || accent} stopOpacity="0.95" />
          <stop offset="100%" stopColor={T.accentDark || accent} stopOpacity="0.8" />
        </linearGradient>
        <linearGradient id="balPlate" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stopColor={T.bg2} />
          <stop offset="100%" stopColor={T.bg0} />
        </linearGradient>
        <radialGradient id="balShine" cx="34%" cy="22%" r="80%">
          <stop offset="0%" stopColor="#ffffff" stopOpacity="0.12" />
          <stop offset="55%" stopColor="#ffffff" stopOpacity="0" />
        </radialGradient>
      </defs>

      {/* drop shadow */}
      <rect x={px + 4} y={py + 8} width={pw} height={ph} rx={prx} fill="#000" opacity="0.35" />
      {/* platform body */}
      <rect x={px} y={py} width={pw} height={ph} rx={prx} fill="url(#balPlate)" stroke={T.inkXLow} strokeWidth="1.5" />

      {/* liquid fill (clipped to platform) */}
      <g clipPath="url(#balClip)">
        <path d={wavePath(3)} fill={T.accentDark || accent} opacity="0.4">
          <animateTransform attributeName="transform" type="translate" from="0 0" to={`${-lambda} 0`} dur="4.8s" repeatCount="indefinite" />
        </path>
        <path d={wavePath(0)} fill="url(#balLiquid)">
          <animateTransform attributeName="transform" type="translate" from="0 0" to={`${-lambda} 0`} dur="3.1s" repeatCount="indefinite" />
        </path>
        {/* milestone level lines */}
        {gc.milestones.map((m) => {
          const y = bottom - (m.pct / 100) * ph;
          const reached = pct >= m.pct;
          return <line key={m.pct} x1={px} y1={y} x2={px + pw} y2={y} stroke={reached ? '#ffffff' : T.inkLow} strokeOpacity={reached ? 0.45 : 0.22} strokeWidth="1" strokeDasharray="3 4" />;
        })}
      </g>

      {/* foot pads (textured zones where you stand) */}
      {[px + 16, px + pw - 16 - padW].map((fx, idx) => (
        <g key={idx}>
          <rect x={fx} y={padY} width={padW} height={padH} rx={16} fill="#ffffff" fillOpacity="0.04" stroke="#ffffff" strokeOpacity="0.10" />
          {[0, 1, 2, 3].map((i) => (
            <line key={i} x1={fx + 12} y1={padY + 20 + i * 16} x2={fx + padW - 12} y2={padY + 20 + i * 16} stroke="#ffffff" strokeOpacity="0.06" strokeWidth="2" strokeLinecap="round" />
          ))}
        </g>
      ))}

      {/* glass shine + accent rim */}
      <rect x={px} y={py} width={pw} height={ph} rx={prx} fill="url(#balShine)" />
      <rect x={px + 3} y={py + 3} width={pw - 6} height={ph - 6} rx={prx - 3} fill="none" stroke={accent} strokeOpacity="0.28" strokeWidth="1.2" />

      {/* corner sensor dots */}
      {[[px + 14, py + 14], [px + pw - 14, py + 14], [px + 14, bottom - 14], [px + pw - 14, bottom - 14]].map((p, i) => (
        <circle key={i} cx={p[0]} cy={p[1]} r="2.5" fill={accent} opacity="0.5" />
      ))}

      {/* DISPLAY WINDOW — the weight readout */}
      <rect x={dispX} y={dispY} width={dispW} height={dispH} rx={12} fill={T.bg0} fillOpacity="0.85" stroke={accent} strokeOpacity="0.55" strokeWidth="1.4" />
      <rect x={dispX} y={dispY} width={dispW} height={dispH} rx={12} fill="none" stroke="#fff" strokeOpacity="0.06" strokeWidth="1" />
      <text x={cx} y={dispY + dispH / 2 + 11} textAnchor="middle" fontFamily={S3FM} fontSize="33" fontWeight="700" fill={accent} style={{ filter: `drop-shadow(0 0 6px ${accent}66)` }}>
        {pct}<tspan fontSize="16" dx="1">%</tspan>
      </text>

      {/* brand label */}
      <text x={cx} y={bottom - 9} textAnchor="middle" fontFamily={S3FM} fontSize="7.5" fill={T.inkLow} letterSpacing="3">FROZEN · BEACH BODY</text>

      {/* milestone emoji tabs on the right */}
      {gc.milestones.map((m) => {
        const y = bottom - (m.pct / 100) * ph;
        const reached = pct >= m.pct;
        return (
          <g key={'e' + m.pct}>
            <line x1={px + pw} y1={y} x2={px + pw + 8} y2={y} stroke={reached ? accent : T.inkLow} strokeOpacity={reached ? 0.7 : 0.3} strokeWidth="1.2" />
            <circle cx={px + pw + 19} cy={y} r={10.5} fill={reached ? `${accent}22` : T.bg1} stroke={reached ? accent : T.inkXLow} strokeWidth="1.2" />
            <text x={px + pw + 19} y={y + 4} textAnchor="middle" fontSize="11" opacity={reached ? 1 : 0.5}>{m.emoji}</text>
          </g>
        );
      })}
    </svg>
  );
}

function WeightSpark({ entries, width = 90, height = 28, color }) {
  if (!entries || entries.length < 2) return <div style={{ width, height }} />;
  const ws = entries.map((e) => e.weight);
  const min = Math.min(...ws), max = Math.max(...ws);
  const span = Math.max(0.5, max - min);
  const pts = ws.map((w, i) => [
    (i / (ws.length - 1)) * (width - 4) + 2,
    height - 3 - ((w - min) / span) * (height - 8),
  ]);
  const d = 'M' + pts.map((p) => p.join(',')).join(' L');
  const last = pts[pts.length - 1];
  return (
    <svg width={width} height={height} style={{ display: 'block' }}>
      <path d={d} fill="none" stroke={color} strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round" />
      <circle cx={last[0]} cy={last[1]} r="2.4" fill={color} />
    </svg>
  );
}

// Multi-series line chart (responsive via viewBox). entries: [{date, ...}].
// series: [{ key, label, color }]. Connects non-null points, breaks on gaps.
function LineChartMulti({ entries, series, yMin, yMax, height = 120, unit = '', integer = false }) {
  const W = 300, padL = 30, padR = 8, padT = 10, padB = 18;
  const plotW = W - padL - padR, plotH = height - padT - padB;
  const n = entries.length;
  // domain
  let lo = yMin, hi = yMax;
  if (lo == null || hi == null) {
    const all = [];
    series.forEach((s) => entries.forEach((e) => { if (e[s.key] != null) all.push(e[s.key]); }));
    if (all.length) { lo = lo == null ? Math.min(...all) : lo; hi = hi == null ? Math.max(...all) : hi; }
    if (lo == null) { lo = 0; hi = 1; }
    if (hi - lo < 0.5) { hi = lo + 1; }
    // pad
    const pad = (hi - lo) * 0.12;
    lo -= pad; hi += pad;
  }
  const xAt = (i) => padL + (n <= 1 ? plotW / 2 : (i / (n - 1)) * plotW);
  const yAt = (v) => padT + plotH - ((v - lo) / (hi - lo)) * plotH;
  const fmt = (v) => integer ? Math.round(v).toLocaleString('fr-FR') : (Math.round(v * 10) / 10);

  // build path per series, splitting on nulls
  const paths = series.map((s) => {
    let d = '', pen = false, lastPt = null;
    entries.forEach((e, i) => {
      const v = e[s.key];
      if (v == null) { pen = false; return; }
      const x = xAt(i), y = yAt(v);
      d += (pen ? ' L' : ' M') + x + ',' + y;
      pen = true; lastPt = [x, y, v];
    });
    return { ...s, d, lastPt };
  });

  const dateLbl = (iso) => { const d = new Date(iso); return isNaN(d) ? '' : `${String(d.getDate()).padStart(2, '0')}/${String(d.getMonth() + 1).padStart(2, '0')}`; };

  return (
    <svg viewBox={`0 0 ${W} ${height}`} width="100%" style={{ display: 'block', overflow: 'visible' }}>
      {/* gridlines */}
      {[0, 0.5, 1].map((f, i) => {
        const y = padT + plotH * f;
        const val = hi - (hi - lo) * f;
        return (
          <g key={i}>
            <line x1={padL} y1={y} x2={W - padR} y2={y} stroke={S3.inkXLow} strokeWidth={0.7} strokeDasharray={i === 2 ? '' : '2 4'} />
            <text x={padL - 5} y={y + 3} textAnchor="end" fontFamily={S3FM} fontSize={7.5} fill={S3.inkLow}>{fmt(val)}</text>
          </g>
        );
      })}
      {/* x labels (first / mid / last) */}
      {n > 0 && [0, Math.floor((n - 1) / 2), n - 1].filter((v, idx, a) => a.indexOf(v) === idx).map((i) => (
        <text key={i} x={xAt(i)} y={height - 5} textAnchor="middle" fontFamily={S3FM} fontSize={7.5} fill={S3.inkLow}>{dateLbl(entries[i].date)}</text>
      ))}
      {/* series */}
      {paths.map((p) => (
        <g key={p.key}>
          <path d={p.d} fill="none" stroke={p.color} strokeWidth={2} strokeLinecap="round" strokeLinejoin="round" />
          {p.lastPt && <circle cx={p.lastPt[0]} cy={p.lastPt[1]} r={2.8} fill={p.color} />}
        </g>
      ))}
    </svg>
  );
}

function BodyEncodeForm({ b, me, accent, reload }) {
  const todayISO = window.todayISO;
  const [open, setOpen] = React.useState(false);
  const [editId, setEditId] = React.useState(null);
  const [date, setDate] = React.useState(todayISO());
  const [vals, setVals] = React.useState({ weight: b.current != null ? String(b.current) : '', sportHours: '', avgSteps: '', energy: '', motivation: '', cravings: '' });
  const [state, setState] = React.useState({ phase: 'idle', msg: '' });
  const set = (k, v) => { setVals((s) => ({ ...s, [k]: v })); setState({ phase: 'idle', msg: '' }); };

  const entries = b.entries || [];
  const recent = entries.slice().reverse().slice(0, 6);

  const loadEntry = (e) => {
    setEditId(e.id);
    setDate(e.date);
    setVals({
      weight: e.weight != null ? String(e.weight) : '',
      sportHours: e.sportHours != null ? String(e.sportHours) : '',
      avgSteps: e.avgSteps != null ? String(e.avgSteps) : '',
      energy: e.energy != null ? String(e.energy) : '',
      motivation: e.motivation != null ? String(e.motivation) : '',
      cravings: e.cravings != null ? String(e.cravings) : '',
    });
    setOpen(true);
  };

  const resetForm = () => {
    setEditId(null); setDate(todayISO());
    setVals({ weight: b.current != null ? String(b.current) : '', sportHours: '', avgSteps: '', energy: '', motivation: '', cravings: '' });
  };

  const doSave = async () => {
    const w = parseFloat(vals.weight);
    if (isNaN(w) || w <= 0) { setState({ phase: 'err', msg: 'Entre un poids valide' }); return; }
    if (state.phase === 'saving') return;
    setState({ phase: 'saving', msg: '' });
    // compute resulting weekly status for sound (vs previous entry before this date)
    const prior = entries.filter((e) => e.date < date);
    let color = 'green';
    if (prior.length) {
      const prev = prior[prior.length - 1];
      const days = Math.max(1, (new Date(date) - new Date(prev.date)) / 86400000);
      const paceKg = ((w - prev.weight) / days) * 7;
      color = window.bodyPaceColor(b, paceKg);
    }
    try {
      await window.saveBodyEntryLive({
        warriorId: b.w.id, entryDate: date, weight: w,
        sportHours: vals.sportHours, avgSteps: vals.avgSteps,
        energy: vals.energy, cravings: vals.cravings, motivation: vals.motivation,
      });
      window.playBodySound(color === 'green' ? 'celebration' : color === 'red' ? 'bad' : 'good');
      setState({ phase: 'ok', msg: editId ? 'Encodage corrigé ✓' : 'Encodage enregistré ✓' });
      resetForm();
      if (reload) reload();
    } catch (e) {
      setState({ phase: 'err', msg: 'Erreur : ' + (e.message || e) });
    }
  };

  const doDelete = async (e) => {
    if (!window.confirm('Supprimer l\'encodage du ' + fmtDateShort(e.date) + ' ?')) return;
    try { await window.deleteBodyEntryLive(e.id); if (reload) reload(); } catch (err) {}
  };

  const field = (label, k, unit, step) => (
    <div style={{ display: 'flex', flexDirection: 'column', gap: 3 }}>
      <label style={{ fontFamily: S3FM, fontSize: 8.5, color: S3.inkLow, letterSpacing: 0.4 }}>{label}</label>
      <div style={{ display: 'flex', alignItems: 'center', background: S3.inkXLow, borderRadius: 9, padding: '0 9px', border: `1px solid ${S3.inkXLow}` }}>
        <input value={vals[k]} onChange={(ev) => set(k, ev.target.value)} type="number" step={step || 'any'} inputMode="decimal" placeholder="—"
          style={{ flex: 1, background: 'none', border: 'none', outline: 'none', color: S3.ink, fontFamily: S3FM, fontSize: 14, fontWeight: 700, width: '100%', padding: '9px 0' }} />
        {unit && <span style={{ fontFamily: S3FM, fontSize: 9, color: S3.inkLow }}>{unit}</span>}
      </div>
    </div>
  );

  return (
    <div style={{ borderRadius: 14, border: `1px solid ${accent}33`, background: `${S3.bg1}cc`, padding: 12 }}>
      <button onClick={() => { if (open) resetForm(); setOpen((o) => !o); setState({ phase: 'idle', msg: '' }); }} style={{
        width: '100%', display: 'flex', alignItems: 'center', justifyContent: 'space-between', cursor: 'pointer',
        background: 'none', border: 'none', color: S3.ink, fontFamily: S3FT, fontSize: 13, fontWeight: 700, padding: 0,
      }}>
        <span>✎ Encoder / corriger mon poids</span>
        <span style={{ color: accent, fontSize: 16 }}>{open ? '▾' : '＋'}</span>
      </button>

      {open && (
        <div style={{ marginTop: 11, display: 'flex', flexDirection: 'column', gap: 9 }}>
          <div style={{ display: 'flex', flexDirection: 'column', gap: 3 }}>
            <label style={{ fontFamily: S3FM, fontSize: 8.5, color: S3.inkLow, letterSpacing: 0.4 }}>DATE {editId ? '(correction)' : ''}</label>
            <input value={date} onChange={(e) => setDate(e.target.value)} type="date"
              style={{ background: S3.inkXLow, border: `1px solid ${S3.inkXLow}`, borderRadius: 9, padding: '9px', color: S3.ink, fontFamily: S3FM, fontSize: 13 }} />
          </div>
          <div style={{ display: 'grid', gridTemplateColumns: 'minmax(0,1fr) minmax(0,1fr)', gap: 8 }}>
            {field('POIDS', 'weight', 'kg')}
            {field('SPORT / SEM', 'sportHours', 'h')}
            {field('PAS MOYENS', 'avgSteps', 'pas')}
            {field('ÉNERGIE', 'energy', '/5')}
            {field('MOTIVATION', 'motivation', '/5')}
            {field('ENVIES ALIM.', 'cravings', '/5')}
          </div>
          <button onClick={doSave} disabled={state.phase === 'saving'} style={{
            padding: '12px', borderRadius: 11, cursor: state.phase === 'saving' ? 'wait' : 'pointer', border: 'none',
            background: `linear-gradient(135deg, ${S3.accentBright || accent}, ${accent})`, color: S3.bg0,
            fontFamily: S3FT, fontSize: 14, fontWeight: 700, boxShadow: `0 4px 16px ${accent}44`, opacity: state.phase === 'saving' ? 0.7 : 1,
          }}>{state.phase === 'saving' ? 'Enregistrement…' : editId ? '💾 Corriger' : '💾 Enregistrer'}</button>
          {state.phase === 'ok' && <div style={{ fontFamily: S3FM, fontSize: 10, color: PACE_COLORS.green, textAlign: 'center' }}>✅ {state.msg}</div>}
          {state.phase === 'err' && <div style={{ fontFamily: S3FM, fontSize: 10, color: PACE_COLORS.red, textAlign: 'center' }}>{state.msg}</div>}
          {editId && <button onClick={resetForm} style={{ background: 'none', border: 'none', color: S3.inkLow, fontFamily: S3FM, fontSize: 10, cursor: 'pointer' }}>+ nouvel encodage</button>}

          {/* recent entries to correct/delete */}
          {recent.length > 0 && (
            <div style={{ marginTop: 4, borderTop: `1px solid ${S3.inkXLow}`, paddingTop: 8 }}>
              <div style={{ fontFamily: S3FM, fontSize: 8.5, color: S3.inkLow, letterSpacing: 0.4, marginBottom: 6 }}>DERNIERS ENCODAGES</div>
              <div style={{ display: 'flex', flexDirection: 'column', gap: 4 }}>
                {recent.map((e) => (
                  <div key={e.id} style={{ display: 'flex', alignItems: 'center', gap: 8, fontFamily: S3FM, fontSize: 11, color: S3.inkDim }}>
                    <span style={{ width: 42 }}>{fmtDateShort(e.date)}</span>
                    <span style={{ flex: 1, color: S3.ink, fontWeight: 700 }}>{e.weight} kg</span>
                    <button onClick={() => loadEntry(e)} style={{ background: 'none', border: `1px solid ${S3.inkXLow}`, borderRadius: 7, color: accent, cursor: 'pointer', fontSize: 11, padding: '3px 8px' }}>✎</button>
                    <button onClick={() => doDelete(e)} style={{ background: 'none', border: `1px solid ${S3.inkXLow}`, borderRadius: 7, color: PACE_COLORS.red, cursor: 'pointer', fontSize: 11, padding: '3px 8px' }}>🗑</button>
                  </div>
                ))}
              </div>
            </div>
          )}
        </div>
      )}
    </div>
  );
}

        <div style={{ display: 'flex', justifyContent: 'space-between', fontFamily: S3FM, fontSize: 11 }}>
          <span style={{ color: S3.inkLow }}>départ {b.start != null ? b.start + 'kg' : '—'}</span>
          <span style={{ color: accent, fontWeight: 700, fontSize: 15 }}>{b.current != null ? b.current + ' kg' : '—'}</span>
          <span style={{ color: S3.inkLow }}>cible {b.target != null ? b.target + 'kg' : '—'}</span>
        </div>
        <ProgressBar value={b.pct} max={100} color={g.color} height={7} />
        <div style={{ display: 'flex', justifyContent: 'space-between', fontFamily: S3FM, fontSize: 9, color: S3.inkDim }}>
          <span>{b.pct}% de l'objectif</span>
          {b.weeklyPace != null && b.paceRange != null && (
            <span>cible cadence : {b.goalType === 'recompo' ? '±' : ''}{b.weeklyPace} ±{b.paceRange} g/sem</span>
          )}
        </div>
        {proj && (
          <div style={{ marginTop: 2, fontFamily: S3FT, fontSize: 12, fontWeight: 700, color: accent }}>
            🎯 Objectif atteint le <span style={{ textDecoration: 'underline' }}>{fmtDateFr(proj)}</span> à cette cadence
          </div>
        )}
        <div style={{ fontFamily: S3FM, fontSize: 9, color: S3.inkLow }}>
          🕑 Dernier encodage : {fmtDateFr(b.lastDate)}
        </div>
      </div>

      {/* cadence legend */}
      <div style={{ display: 'flex', gap: 10, flexWrap: 'wrap', justifyContent: 'center', fontFamily: S3FM, fontSize: 8.5, color: S3.inkLow }}>
        {['green', 'yellow', 'orange', 'red'].map((c) => (
          <span key={c} style={{ display: 'inline-flex', alignItems: 'center', gap: 4 }}>
            <span style={{ width: 8, height: 8, borderRadius: 2, background: PACE_COLORS[c] }} />{PACE_LABEL[c]}
          </span>
        ))}
      </div>

      {canEdit && <BodyEncodeForm b={b} me={me} accent={accent} reload={reload} />}

      {entries.length < 2 ? (
        <div style={{ padding: '24px', textAlign: 'center', fontFamily: S3FM, fontSize: 11, color: S3.inkLow }}>
          Pas assez d'encodages pour tracer des courbes.
        </div>
      ) : (
        <>
          <ChartCard title="Évolution du poids" unit="kg">
            <LineChartMulti entries={entries} series={[{ key: 'weight', label: 'Poids', color: accent }]} height={130} />
          </ChartCard>

          {has('sportHours') && (
            <ChartCard title="Heures de sport / semaine" unit="h">
              <LineChartMulti entries={entries} series={[{ key: 'sportHours', label: 'Sport', color: '#4ade80' }]} yMin={0} height={110} />
            </ChartCard>
          )}

          {has('avgSteps') && (
            <ChartCard title="Pas moyens / jour" unit="pas">
              <LineChartMulti entries={entries} series={[{ key: 'avgSteps', label: 'Pas', color: '#a5f3fc' }]} yMin={0} height={110} integer />
            </ChartCard>
          )}

          {(has('energy') || has('motivation') || has('cravings')) && (
            <ChartCard title="Bien-être" unit="/ 5" legend={[
              { label: 'Énergie', color: '#67e8f9' },
              { label: 'Motivation', color: '#4ade80' },
              { label: 'Envies alim.', color: '#fbbf24' },
            ]}>
              <LineChartMulti entries={entries} yMin={0.5} yMax={5.5} height={120} series={[
                { key: 'energy', label: 'Énergie', color: '#67e8f9' },
                { key: 'motivation', label: 'Motivation', color: '#4ade80' },
                { key: 'cravings', label: 'Envies alim.', color: '#fbbf24' },
              ]} />
            </ChartCard>
          )}
        </>
      )}
    </div>
  );
}
function CorpsScreen({ meta, me, accent, onOpenFiche, reload }) {
  const { Card, Eyebrow, SectionTitle, AnimalBadge, ProgressBar } = window;
  const body = meta.body || [];
  const [selId, setSelId] = React.useState(null);
  const selected = selId && body.find((b) => b.w.id === selId);
  if (selected) return <BodyDetailScreen b={selected} me={me} accent={accent} onBack={() => setSelId(null)} onOpenFiche={onOpenFiche} reload={reload} />;
  const mine = body.find((b) => b.w.id === me.id);
  const others = body.filter((b) => b.w.id !== me.id);

  if (body.length === 0) {
    return (
      <div style={{ padding: '40px 24px', textAlign: 'center' }}>
        <div style={{ fontSize: 40, marginBottom: 12 }}>🧊</div>
        <div style={{ fontFamily: S3FT, fontSize: 16, color: S3.ink, marginBottom: 6 }}>Aucun suivi du corps</div>
        <div style={{ fontFamily: S3FM, fontSize: 11, color: S3.inkLow, lineHeight: 1.5 }}>Personne n'a encore configuré d'objectif poids.</div>
      </div>
    );
  }

  const renderCard = (b, isMe) => {
    const g = GOAL_META[b.goalType] || GOAL_META.recompo;
    const delta = (b.current != null && b.start != null) ? Math.round((b.current - b.start) * 10) / 10 : null;
    const avg = window.avgPaceKg(b.entries);
    const avgColor = PACE_COLORS[window.bodyPaceColor(b, avg)] || PACE_COLORS.grey;
    // weekly delta (last gap normalized to 7d) + its color
    const weekDelta = window.lastWeekDeltaKg(b.entries);
    let weekColor = PACE_COLORS.grey;
    if (b.entries && b.entries.length >= 2) {
      const a = b.entries[b.entries.length - 2], c = b.entries[b.entries.length - 1];
      const days = Math.max(1, (new Date(c.date) - new Date(a.date)) / 86400000);
      weekColor = PACE_COLORS[window.bodyPaceColor(b, ((c.weight - a.weight) / days) * 7)] || PACE_COLORS.grey;
    }
    const weekTxt = weekDelta != null ? `${weekDelta > 0 ? '+' : ''}${weekDelta} kg` : '—';
    return (
      <Card key={b.w.id} glow={isMe} onClick={() => setSelId(b.w.id)} style={{
        padding: 14, border: `1px solid ${isMe ? accent + '55' : S3.inkXLow}`,
        background: isMe ? `${accent}10` : undefined,
      }}>
        <div style={{ display: 'flex', alignItems: 'center', gap: 11, marginBottom: 10 }}>
          <AnimalBadge animal={b.w.animal} size={36} ring={isMe} />
          <div style={{ flex: 1, minWidth: 0 }}>
            <div style={{ fontFamily: S3FT, fontSize: 14, fontWeight: 600, color: S3.ink, whiteSpace: 'nowrap', overflow: 'hidden', textOverflow: 'ellipsis' }}>{b.w.name}</div>
            <div style={{ fontFamily: S3FM, fontSize: 9, color: S3.inkLow, marginTop: 1 }}>{g.emoji} {g.label}{delta != null ? ` · ${delta > 0 ? '+' : ''}${delta} kg` : ''}</div>
          </div>
          {/* cadence + week delta chips (colored) */}
          <div style={{ display: 'flex', alignItems: 'center', gap: 6, flexShrink: 0 }}>
            <div style={{ display: 'flex', flexDirection: 'column', alignItems: 'center', gap: 2 }}>
              <span style={{
                fontFamily: S3FM, fontSize: 10.5, fontWeight: 700, color: weekColor,
                padding: '3px 7px', borderRadius: 99, border: `1px solid ${weekColor}55`, background: `${weekColor}1a`,
                whiteSpace: 'nowrap',
              }}>{weekTxt}</span>
              <span style={{ fontFamily: S3FM, fontSize: 7, color: S3.inkLow, letterSpacing: 0.3 }}>Δ SEM.</span>
            </div>
            <div style={{ display: 'flex', flexDirection: 'column', alignItems: 'center', gap: 2 }}>
              <span style={{
                fontFamily: S3FM, fontSize: 10.5, fontWeight: 700, color: avgColor,
                padding: '3px 7px', borderRadius: 99, border: `1px solid ${avgColor}55`, background: `${avgColor}1a`,
                whiteSpace: 'nowrap',
              }}>{avg != null ? paceText(avg) : '—'}</span>
              <span style={{ fontFamily: S3FM, fontSize: 7, color: S3.inkLow, letterSpacing: 0.3 }}>CADENCE</span>
            </div>
          </div>
        </div>
        {/* start → current → target */}
        <div style={{ display: 'flex', justifyContent: 'space-between', fontFamily: S3FM, fontSize: 10, marginBottom: 5 }}>
          <span style={{ color: S3.inkLow }}>départ {b.start != null ? b.start + 'kg' : '—'}</span>
          <span style={{ color: accent, fontWeight: 700 }}>{b.current != null ? b.current + 'kg' : '—'}</span>
          <span style={{ color: S3.inkLow }}>cible {b.target != null ? b.target + 'kg' : '—'}</span>
        </div>
        <ProgressBar value={b.pct} max={100} color={g.color} height={7} />
        <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', fontFamily: S3FM, fontSize: 9, color: S3.inkDim, marginTop: 5 }}>
          <span style={{ color: S3.inkLow }}>🕑 {b.lastDate ? fmtDateShort(b.lastDate) : '—'}</span>
          <span>{b.pct}% · voir les courbes ›</span>
        </div>
      </Card>
    );
  };

  return (
    <div style={{ padding: '4px 14px', display: 'flex', flexDirection: 'column', gap: 14 }}>
      {meta.groupChallenge && meta.groupChallenge.totalToLose > 0 && (
        <div>
          <SectionTitle right={`${meta.groupChallenge.memberCount} membres`}>Beach Body — défi de groupe</SectionTitle>
          <Card glow style={{ padding: '12px 12px 14px', background: `linear-gradient(170deg, ${S3.bg1}, ${S3.bg0})` }}>
            <GaugeBalance gc={meta.groupChallenge} accent={accent} />
            <div style={{ textAlign: 'center', marginTop: 4, marginBottom: 2 }}>
              <span style={{ fontFamily: S3FM, fontSize: 15, fontWeight: 700, color: accent }}>{meta.groupChallenge.totalProgress}</span>
              <span style={{ fontFamily: S3FM, fontSize: 12, color: S3.inkDim }}> / {meta.groupChallenge.totalToLose} kg accomplis</span>
              <span style={{ fontFamily: S3FM, fontSize: 11, color: S3.inkLow }}> · {meta.groupChallenge.memberCount} guerriers</span>
            </div>
            <div style={{ display: 'grid', gridTemplateColumns: 'minmax(0,1fr) minmax(0,1fr)', gap: 7, marginTop: 12 }}>
              {meta.groupChallenge.milestones.map((m) => {
                const reached = meta.groupChallenge.pct >= m.pct;
                return (
                  <div key={m.pct} style={{
                    display: 'flex', alignItems: 'center', gap: 8, padding: '8px 10px', borderRadius: 11,
                    background: reached ? `${accent}14` : `${S3.bg1}aa`,
                    border: `1px solid ${reached ? accent + '44' : S3.inkXLow}`,
                    opacity: reached ? 1 : 0.72,
                  }}>
                    <span style={{ fontSize: 17, filter: reached ? 'none' : 'grayscale(0.5)' }}>{m.emoji}</span>
                    <div style={{ flex: 1, minWidth: 0 }}>
                      <div style={{ fontFamily: S3FT, fontSize: 11.5, fontWeight: 700, color: reached ? S3.ink : S3.inkDim }}>{m.pct}% · {m.label}</div>
                      <div style={{ fontFamily: S3FM, fontSize: 8, color: S3.inkLow, whiteSpace: 'nowrap', overflow: 'hidden', textOverflow: 'ellipsis' }}>{m.desc}</div>
                    </div>
                    {reached && <span style={{ color: accent, fontSize: 12 }}>✓</span>}
                  </div>
                );
              })}
            </div>
          </Card>
        </div>
      )}

      {/* cadence color legend */}
      <div style={{ display: 'flex', gap: 10, flexWrap: 'wrap', justifyContent: 'center', fontFamily: S3FM, fontSize: 8.5, color: S3.inkLow, marginTop: -4 }}>
        {['green', 'yellow', 'orange', 'red'].map((c) => (
          <span key={c} style={{ display: 'inline-flex', alignItems: 'center', gap: 4 }}>
            <span style={{ width: 8, height: 8, borderRadius: 2, background: PACE_COLORS[c] }} />{PACE_LABEL[c]}
          </span>
        ))}
      </div>

      {mine && (
        <div>
          <SectionTitle>Mon objectif</SectionTitle>
          {renderCard(mine, true)}
        </div>
      )}
      <div>
        <SectionTitle right={`${others.length}`}>{mine ? 'La tribu' : 'Objectifs de l\'équipe'}</SectionTitle>
        <div style={{ display: 'flex', flexDirection: 'column', gap: 10, paddingBottom: 6 }}>
          {others.map((b) => renderCard(b, false))}
        </div>
      </div>
    </div>
  );
}

Object.assign(window, { RankingsScreen, CorpsScreen, BodyDetailScreen, LineChartMulti, GaugeBalance });

</script>
<script type="text/babel" data-from="app-social.jsx">
// app-social.jsx — Encouragements: reactions on feed items (1 per person),
// stacked reactor avatars, home banner + "Encouragements" inbox with badge.

const SOC = window.APP_T;
const SOCFT = window.APP_FT;
const SOCFM = window.APP_FM;

const REACTIONS = [
  { type: 'ahou',    emoji: '🛡️', label: 'AHOU',    color: '#67e8f9' },
  { type: 'respect', emoji: '👊', label: 'RESPECT', color: '#fbbf24' },
  { type: 'frozen',  emoji: '❄️', label: 'FROZEN',  color: '#a5d8ea' },
  { type: 'fire',    emoji: '🔥', label: 'FIRE',    color: '#fb7185' },
];
const REACTION_BY_TYPE = REACTIONS.reduce((m, r) => { m[r.type] = r; return m; }, {});

// ─── small reactor avatar (animal emoji or fallback) ───────────────────
function ReactorDot({ animal, size = 22, ring = SOC.bg1 }) {
  return (
    <div style={{
      width: size, height: size, borderRadius: '50%', flexShrink: 0,
      background: SOC.bg2, border: `2px solid ${ring}`,
      display: 'grid', placeItems: 'center', fontSize: size * 0.52,
      boxShadow: `0 0 0 1px ${SOC.inkXLow}`,
    }}>{animal && animal.emoji ? animal.emoji : '🧊'}</div>
  );
}

// ─── encouragement helpers ─────────────────────────────────────────────
function myReceivedEncouragements(feed, meId) {
  if (!meId) return [];
  const out = [];
  (feed || []).forEach((item) => {
    if (item.warriorId !== meId) return;
    (item.reactions || []).forEach((r) => {
      if (r.warriorId === meId) return; // ignore self-reactions
      out.push({ r, item });
    });
  });
  out.sort((a, b) => String(b.r.createdAt || '').localeCompare(String(a.r.createdAt || '')));
  return out;
}

function encSeenKey(meId) { return 'fw_enc_seen_' + meId; }
function getEncSeen(meId) { try { return localStorage.getItem(encSeenKey(meId)) || ''; } catch (e) { return ''; } }
function markEncSeen(meId) { try { localStorage.setItem(encSeenKey(meId), new Date().toISOString()); } catch (e) {} }

function encBadgeCount(feed, meId) {
  const seen = getEncSeen(meId);
  return myReceivedEncouragements(feed, meId).filter(({ r }) => (r.createdAt || '') > seen).length;
}

function recentReactorCount(feed, meId, days = 7) {
  const since = Date.now() - days * 86400000;
  const ids = new Set();
  myReceivedEncouragements(feed, meId).forEach(({ r }) => {
    const t = r.createdAt ? new Date(r.createdAt).getTime() : 0;
    if (t >= since) ids.add(r.warriorId);
  });
  return ids.size;
}

// ─── reaction bar (the 4 pills) ────────────────────────────────────────
function ReactionBar({ reactions, mine, onReact, accent }) {
  const counts = {};
  (reactions || []).forEach((r) => { counts[r.type] = (counts[r.type] || 0) + 1; });
  return (
    <div style={{ display: 'flex', gap: 5, flexWrap: 'wrap' }}>
      {REACTIONS.map((R) => {
        const n = counts[R.type] || 0;
        const active = mine === R.type;
        return (
          <button key={R.type} onClick={(e) => { e.stopPropagation(); onReact(R.type); }} style={{
            display: 'inline-flex', alignItems: 'center', gap: 4,
            padding: n > 0 ? '4px 9px' : '4px 8px', borderRadius: 99, cursor: 'pointer',
            border: `1px solid ${active ? R.color : SOC.inkXLow}`,
            background: active ? `${R.color}22` : `${SOC.bg2}99`,
            transition: 'transform 0.12s ease',
            transform: active ? 'scale(1.04)' : 'scale(1)',
          }}>
            <span style={{ fontSize: 12, lineHeight: 1 }}>{R.emoji}</span>
            {n > 0 && <span style={{ fontFamily: SOCFM, fontSize: 10, fontWeight: 700, color: active ? R.color : SOC.inkDim }}>{n}</span>}
          </button>
        );
      })}
    </div>
  );
}

// ─── feed item with reactions + reactor stack ──────────────────────────
function FeedItem({ f, me, accent, onReact }) {
  const FEED_ICONS = window.FEED_ICONS;
  const relativeTime = window.relativeTime;
  const [local, setLocal] = React.useState(f.reactions || []);
  const [open, setOpen] = React.useState(false);
  const sig = (f.reactions || []).map((r) => r.warriorId + r.type).join('|');
  React.useEffect(() => { setLocal(f.reactions || []); }, [sig]);

  const mine = (local.find((r) => r.warriorId === (me && me.id)) || {}).type || null;

  const react = (type) => {
    const remove = mine === type;
    // optimistic
    let next = local.filter((r) => r.warriorId !== me.id);
    if (!remove) next = next.concat([{ id: 'fr_' + f.id + '_' + me.id, warriorId: me.id, warriorName: me.name, type, animal: me.animal || null, createdAt: new Date().toISOString() }]);
    setLocal(next);
    if (onReact) onReact(f.id, type, remove);
  };

  const isMine = f.warriorId && me && f.warriorId === me.id;
  const shown = local.slice(0, 6);
  const extra = local.length - shown.length;

  return (
    <div style={{
      display: 'flex', gap: 10, alignItems: 'flex-start', padding: '9px 11px', borderRadius: 12,
      background: isMine ? `${accent}10` : `${SOC.bg1}99`,
      border: `1px solid ${isMine ? accent + '44' : SOC.inkXLow}`,
    }}>
      <div style={{ fontSize: 16, lineHeight: 1.2, flexShrink: 0 }}>{FEED_ICONS[f.type] || '⚡'}</div>
      <div style={{ flex: 1, minWidth: 0 }}>
        <div style={{ fontFamily: SOCFT, fontSize: 12, color: SOC.inkDim, lineHeight: 1.35 }}>{f.message}</div>
        <div style={{ fontFamily: SOCFM, fontSize: 8.5, color: SOC.inkLow, marginTop: 3 }}>
          {relativeTime(f.createdAt)}{isMine ? ' · toi' : ''}
        </div>

        {/* reactor stack (2A) */}
        {local.length > 0 && (
          <div onClick={() => setOpen((o) => !o)} style={{ display: 'flex', alignItems: 'center', gap: 6, marginTop: 8, cursor: 'pointer' }}>
            <div style={{ display: 'flex' }}>
              {shown.map((r, i) => (
                <div key={r.id || i} style={{ marginLeft: i === 0 ? 0 : -7, position: 'relative' }}>
                  <ReactorDot animal={r.animal} />
                  <span style={{ position: 'absolute', right: -3, bottom: -3, fontSize: 9 }}>{(REACTION_BY_TYPE[r.type] || {}).emoji}</span>
                </div>
              ))}
            </div>
            {extra > 0 && <span style={{ fontFamily: SOCFM, fontSize: 10, color: SOC.inkLow, marginLeft: 2 }}>+{extra}</span>}
            <span style={{ fontFamily: SOCFM, fontSize: 9, color: SOC.inkLow }}>{open ? '▾' : '·'}</span>
          </div>
        )}

        {/* expanded reactor list */}
        {open && local.length > 0 && (
          <div style={{ marginTop: 7, display: 'flex', flexDirection: 'column', gap: 5, padding: '8px 9px', borderRadius: 10, background: `${SOC.bg2}aa`, border: `1px solid ${SOC.inkXLow}` }}>
            {local.slice().sort((a, b) => String(b.createdAt || '').localeCompare(String(a.createdAt || ''))).map((r, i) => (
              <div key={r.id || i} style={{ display: 'flex', alignItems: 'center', gap: 8 }}>
                <ReactorDot animal={r.animal} size={18} ring={SOC.bg2} />
                <span style={{ flex: 1, fontFamily: SOCFT, fontSize: 11, color: SOC.ink, whiteSpace: 'nowrap', overflow: 'hidden', textOverflow: 'ellipsis' }}>
                  {r.warriorId === (me && me.id) ? 'Toi' : r.warriorName}
                </span>
                <span style={{ fontSize: 12 }}>{(REACTION_BY_TYPE[r.type] || {}).emoji}</span>
              </div>
            ))}
          </div>
        )}

        {/* reaction bar (1A) */}
        <div style={{ marginTop: 8 }}>
          <ReactionBar reactions={local} mine={mine} onReact={react} accent={accent} />
        </div>
      </div>
    </div>
  );
}

// ─── home banner (3C) ──────────────────────────────────────────────────
function EncouragementBanner({ feed, me, accent, onOpen }) {
  const n = recentReactorCount(feed, me && me.id, 7);
  if (!n) return null;
  const recent = myReceivedEncouragements(feed, me && me.id).slice(0, 4);
  return (
    <div onClick={onOpen} style={{
      display: 'flex', alignItems: 'center', gap: 11, cursor: 'pointer',
      padding: '12px 14px', borderRadius: 14, marginBottom: 4,
      background: `linear-gradient(120deg, ${accent}22, ${SOC.bg1}aa)`,
      border: `1px solid ${accent}55`,
    }}>
      <div style={{ fontSize: 22 }}>👏</div>
      <div style={{ flex: 1, minWidth: 0 }}>
        <div style={{ fontFamily: SOCFT, fontSize: 13, fontWeight: 700, color: SOC.ink }}>
          {n} guerrier{n > 1 ? 's' : ''} t'{n > 1 ? 'ont' : 'a'} encouragé cette semaine
        </div>
        <div style={{ fontFamily: SOCFM, fontSize: 9.5, color: SOC.inkDim, marginTop: 1 }}>Touche pour voir qui →</div>
      </div>
      <div style={{ display: 'flex' }}>
        {recent.map(({ r }, i) => (
          <div key={r.id || i} style={{ marginLeft: i === 0 ? 0 : -7 }}><ReactorDot animal={r.animal} /></div>
        ))}
      </div>
    </div>
  );
}

// ─── encouragements inbox (3A) ─────────────────────────────────────────
function EncouragementsScreen({ feed, me, accent, onOpenFiche }) {
  const list = myReceivedEncouragements(feed, me && me.id);
  const relativeTime = window.relativeTime;
  React.useEffect(() => { markEncSeen(me && me.id); }, [me && me.id]);

  if (!list.length) {
    return (
      <div style={{ padding: '46px 28px', textAlign: 'center' }}>
        <div style={{ fontSize: 40, marginBottom: 12 }}>👏</div>
        <div style={{ fontFamily: SOCFT, fontSize: 16, color: SOC.ink, marginBottom: 6 }}>Pas encore d'encouragement</div>
        <div style={{ fontFamily: SOCFM, fontSize: 11, color: SOC.inkLow, lineHeight: 1.5 }}>
          Quand un guerrier réagira à un de tes records ou bonnes habitudes, ça apparaîtra ici.
        </div>
      </div>
    );
  }

  // group consecutive by feed item for context
  return (
    <div style={{ padding: '4px 14px 8px', display: 'flex', flexDirection: 'column', gap: 8 }}>
      <div style={{ fontFamily: SOCFM, fontSize: 9.5, color: SOC.inkLow, letterSpacing: 0.5, paddingLeft: 2 }}>
        {list.length} encouragement{list.length > 1 ? 's' : ''} reçu{list.length > 1 ? 's' : ''}
      </div>
      {list.map(({ r, item }, i) => {
        const R = REACTION_BY_TYPE[r.type] || {};
        return (
          <div key={(r.id || i) + '_' + i} style={{
            display: 'flex', alignItems: 'center', gap: 11, padding: '10px 12px', borderRadius: 13,
            background: `${SOC.bg1}cc`, border: `1px solid ${SOC.inkXLow}`,
          }}>
            <div style={{ position: 'relative', flexShrink: 0 }}>
              <ReactorDot animal={r.animal} size={34} />
              <span style={{ position: 'absolute', right: -4, bottom: -4, fontSize: 14 }}>{R.emoji}</span>
            </div>
            <div style={{ flex: 1, minWidth: 0 }}>
              <div style={{ fontFamily: SOCFT, fontSize: 12.5, color: SOC.ink }}>
                <b>{r.warriorName}</b> t'a envoyé <b style={{ color: R.color }}>{R.label}</b>
              </div>
              <div style={{ fontFamily: SOCFM, fontSize: 9.5, color: SOC.inkLow, marginTop: 2, whiteSpace: 'nowrap', overflow: 'hidden', textOverflow: 'ellipsis' }}>
                sur : {item.message}
              </div>
            </div>
            <span style={{ fontFamily: SOCFM, fontSize: 8.5, color: SOC.inkLow, flexShrink: 0 }}>{relativeTime(r.createdAt)}</span>
          </div>
        );
      })}
    </div>
  );
}

Object.assign(window, {
  REACTIONS, REACTION_BY_TYPE, ReactionBar, FeedItem, ReactorDot,
  EncouragementBanner, EncouragementsScreen,
  myReceivedEncouragements, encBadgeCount, recentReactorCount, markEncSeen,
});

</script>
<script type="text/babel">
function MobileRoot(){
  const [vh,setVh]=React.useState(window.innerHeight);
  React.useEffect(()=>{const r=()=>setVh(window.innerHeight);window.addEventListener('resize',r);return ()=>window.removeEventListener('resize',r);},[]);
  return <div style={{height:vh+'px',width:'100%'}}><FWApp accent="#67e8f9" particlesOn={true} /></div>;
}
ReactDOM.createRoot(document.getElementById('root')).render(<MobileRoot />);
</script>
</body>
