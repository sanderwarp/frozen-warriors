<script type="text/babel" data-from="app-screens2.jsx">
// app-screens2.jsx — Wave 2 screens: Challenge, Saisie résultat, Roster.
// Atoms + tokens from app-shell.jsx (window.*).

const S2 = window.APP_T;
const S2FT = window.APP_FT;
const S2FM = window.APP_FM;

// ════════════════════════════════════════════════════════════════════════
// CHALLENGE
// ════════════════════════════════════════════════════════════════════════
function ChallengeScreen({ me, meta, accent, onOpenFiche, reload }) {
  const { Card, Eyebrow, SectionTitle, AnimalBadge, RankPill } = window;
  const ch = meta.challenge;
  const [myVal, setMyVal] = React.useState('');
  const [state, setState] = React.useState({ phase: 'idle', msg: '' });

  if (!ch) {
    return (
      <div style={{ padding: '40px 24px', textAlign: 'center' }}>
        <div style={{ fontSize: 40, marginBottom: 12 }}>⚔️</div>
        <div style={{ fontFamily: S2FT, fontSize: 16, color: S2.ink, marginBottom: 6 }}>Aucun challenge actif</div>
        <div style={{ fontFamily: S2FM, fontSize: 11, color: S2.inkLow }}>Le prochain défi sera bientôt publié.</div>
      </div>
    );
  }

  const lb = ch.leaderboard;
  const myEntry = lb.find((e) => e.w.id === me.id);
  const myRank = myEntry ? lb.indexOf(myEntry) + 1 : null;

  return (
    <div style={{ padding: '4px 14px', display: 'flex', flexDirection: 'column', gap: 14 }}>
      {/* Hero */}
      <Card glow style={{ padding: 16, background: `linear-gradient(150deg, ${accent}1a, ${S2.bg0})`, border: `1px solid ${accent}33` }}>
        <Eyebrow>⚔️ Challenge · {meta.activeMonthLabel}</Eyebrow>
        <div style={{ fontFamily: S2FT, fontSize: 21, fontWeight: 700, color: S2.ink, margin: '6px 0 6px', lineHeight: 1.05 }}>{ch.title}</div>
        {ch.description && <div style={{ fontFamily: S2FT, fontSize: 12.5, color: S2.inkDim, lineHeight: 1.5 }}>{ch.description}</div>}
        <div style={{ display: 'flex', gap: 6, marginTop: 12, flexWrap: 'wrap' }}>
          {ch.unit && <span style={{ fontFamily: S2FM, fontSize: 10, color: accent, padding: '3px 9px', borderRadius: 99, background: `${accent}14`, border: `1px solid ${accent}33` }}>📏 {ch.unit}</span>}
          <span style={{ fontFamily: S2FM, fontSize: 10, color: S2.inkDim, padding: '3px 9px', borderRadius: 99, background: S2.inkXLow }}>🎽 T-shirt au vainqueur</span>
          <span style={{ fontFamily: S2FM, fontSize: 10, color: S2.inkDim, padding: '3px 9px', borderRadius: 99, background: S2.inkXLow }}>{lb.length} participants</span>
        </div>
      </Card>

      {/* Submit my result */}
      <Card style={{ padding: 14 }}>
        <Eyebrow style={{ marginBottom: 8 }}>📤 Soumettre mon résultat</Eyebrow>
        <div style={{ display: 'flex', gap: 8, alignItems: 'stretch' }}>
          <div style={{ flex: 1, display: 'flex', alignItems: 'center', background: S2.inkXLow, borderRadius: 11, padding: '0 12px', border: `1px solid ${S2.inkXLow}` }}>
            <input
              value={myVal}
              onChange={(e) => { setMyVal(e.target.value); setState({ phase: 'idle', msg: '' }); }}
              type="number" placeholder="0" inputMode="decimal"
              style={{ flex: 1, background: 'none', border: 'none', outline: 'none', color: S2.ink, fontFamily: S2FM, fontSize: 18, fontWeight: 700, width: '100%', padding: '10px 0' }}
            />
            <span style={{ fontFamily: S2FM, fontSize: 11, color: S2.inkLow }}>{ch.unit}</span>
          </div>
          <button onClick={async () => {
            const v = parseFloat(myVal);
            if (isNaN(v) || v <= 0) { setState({ phase: 'err', msg: 'Entre une valeur valide' }); return; }
            if (state.phase === 'saving') return;
            setState({ phase: 'saving', msg: '' });
            try {
              await window.submitChallengeLive({ challengeId: ch.id, warriorId: me.id, value: v });
              try {
                window.writeFeedLive && window.writeFeedLive({
                  id: 'fd_ch_' + ch.id + '_' + me.id,
                  type: 'challenge', warriorId: me.id,
                  message: me.name + ' a soumis ' + v + (ch.unit ? ' ' + ch.unit : '') + ' au challenge « ' + ch.title + ' »',
                });
              } catch (e) {}
              setState({ phase: 'ok', msg: 'Résultat enregistré ✓' });
              setMyVal('');
              if (reload) reload();
            } catch (e) {
              setState({ phase: 'err', msg: 'Erreur : ' + (e.message || e) });
            }
          }} disabled={state.phase === 'saving'} style={{
            padding: '0 16px', borderRadius: 11, cursor: state.phase === 'saving' ? 'wait' : 'pointer',
            border: 'none', background: `linear-gradient(135deg, ${S2.accentBright || accent}, ${accent})`,
            color: S2.bg0, fontFamily: S2FT, fontSize: 13, fontWeight: 700, whiteSpace: 'nowrap',
            boxShadow: `0 0 16px ${accent}55`, opacity: state.phase === 'saving' ? 0.7 : 1,
          }}>{state.phase === 'saving' ? '…' : 'Enregistrer'}</button>
        </div>
        {state.phase === 'ok' && <div style={{ marginTop: 8, fontFamily: S2FM, fontSize: 10.5, color: S2.good }}>✅ {state.msg} — écrit dans Supabase</div>}
        {state.phase === 'err' && <div style={{ marginTop: 8, fontFamily: S2FM, fontSize: 10, color: S2.bad }}>{state.msg}</div>}
        {myRank && state.phase === 'idle' && <div style={{ marginTop: 8, fontFamily: S2FM, fontSize: 10, color: S2.inkDim }}>Ton meilleur actuel : <span style={{ color: accent, fontWeight: 700 }}>{myEntry.value} {ch.unit}</span> · #{myRank}</div>}
      </Card>

      {/* Leaderboard */}
      <div style={{ paddingBottom: 6 }}>
        <SectionTitle right={`${lb.length} résultats`}>🏅 Classement</SectionTitle>
        {lb.length === 0 ? (
          <div style={{ fontFamily: S2FM, fontSize: 11, color: S2.inkLow, padding: '16px 0', textAlign: 'center' }}>Aucun résultat encore. Sois le premier ! 💪</div>
        ) : (
          <div style={{ display: 'flex', flexDirection: 'column', gap: 6 }}>
            {lb.map((e, i) => {
              const isMe = e.w.id === me.id;
              return (
                <div key={e.w.id} onClick={() => onOpenFiche(e.w.id)} style={{
                  display: 'flex', alignItems: 'center', gap: 10, cursor: 'pointer',
                  padding: '8px 11px', borderRadius: 12,
                  background: isMe ? `${accent}16` : `${S2.bg1}cc`,
                  border: `1px solid ${isMe ? accent + '55' : S2.inkXLow}`,
                }}>
                  <RankPill rank={i + 1} />
                  <AnimalBadge animal={e.w.animal} size={30} ring={isMe} />
                  <span style={{ flex: 1, fontFamily: S2FT, fontSize: 13.5, fontWeight: 600, color: S2.ink, whiteSpace: 'nowrap', overflow: 'hidden', textOverflow: 'ellipsis' }}>
                    {e.w.name}{isMe && <span style={{ fontFamily: S2FM, fontSize: 8.5, color: accent, marginLeft: 6 }}>MOI</span>}
                  </span>
                  <span style={{ fontFamily: S2FM, fontSize: 15, fontWeight: 700, color: i === 0 ? accent : S2.inkDim }}>{e.value}<span style={{ fontSize: 8.5, color: S2.inkLow, marginLeft: 3 }}>{ch.unit}</span></span>
                </div>
              );
            })}
          </div>
        )}
      </div>
    </div>
  );
}

// ════════════════════════════════════════════════════════════════════════
// SAISIE RÉSULTAT
// ════════════════════════════════════════════════════════════════════════
function SaisieScreen({ me, accent, reload }) {
  const { Card, Eyebrow, SectionTitle, AnimalBadge, ProgressBar } = window;
  const TEST_META = window.TEST_META;
  const CAT_ORDER = window.CAT_ORDER;
  const AXES = window.AXES;
  const [vals, setVals] = React.useState({});
  const [legMode, setLegMode] = React.useState('legext');
  const [state, setState] = React.useState({ phase: 'idle', msg: '' });

  const set = (id, v) => { setVals((s) => ({ ...s, [id]: v })); setState({ phase: 'idle', msg: '' }); };

  const doSave = async () => {
    if (state.phase === 'saving') return;
    setState({ phase: 'saving', msg: '' });
    try {
      await window.saveResultLive({ warriorId: me.id, date: window.todayISO(), values: vals, legMode });
      // Détecte les records battus (vs meilleurs précédents) → message feed « PR »
      try {
        const best = (me && me.raw) || {};
        const prs = [];
        (TEST_META || []).forEach((t) => {
          const id = (t.id === 'legext' && legMode === 'backsquat') ? 'backsquat' : t.id;
          const m = (t.id === 'legext' && legMode === 'backsquat') ? t.alt : t;
          const v = parseFloat(vals[id]);
          if (isNaN(v)) return;
          const prevBest = best[id];
          if (prevBest == null) return; // pas de record antérieur = pas un PR
          const beaten = id === 'bp' ? v < prevBest : v > prevBest;
          if (beaten) prs.push(m.label + ' ' + v + (m.unit ? ' ' + m.unit : ''));
        });
        if (prs.length && window.writeFeedLive) {
          window.writeFeedLive({
            id: 'fd_pr_' + me.id + '_' + window.todayISO(),
            type: 'personal_record', warriorId: me.id,
            message: me.name + (prs.length > 1 ? ' a battu ' + prs.length + ' records : ' : ' — nouveau record : ') + prs.slice(0, 4).join(' · '),
          });
        }
      } catch (e) {}
      setState({ phase: 'ok', msg: 'Bilan enregistré dans Supabase ✓' });
      if (reload) reload();
    } catch (e) {
      setState({ phase: 'err', msg: 'Erreur : ' + (e.message || e) });
    }
  };

  // Build a result object and score it live
  const warriorLike = { gender: me.gender || 'homme', weight: me.weight, height: me.height };
  const result = { ...vals, legext_mode: legMode };
  const stats = window.resultToStats(warriorLike, result);
  const present = window.resultPresence(warriorLike, result);
  const { total } = window.calcScoreLive(warriorLike, result);
  const filledCount = present.filter(Boolean).length;
  const animal = window.getAnimal(total);
  const catColor = (cat) => accent;

  // Group tests by category in canonical order
  const byCat = {};
  TEST_META.forEach((t) => { (byCat[t.cat] = byCat[t.cat] || []).push(t); });

  const inputStyle = {
    width: 64, background: S2.inkXLow, border: `1px solid ${S2.inkXLow}`, borderRadius: 9,
    color: S2.ink, fontFamily: S2FM, fontSize: 14, fontWeight: 700, textAlign: 'right',
    padding: '7px 9px', outline: 'none',
  };

  return (
    <div style={{ padding: '4px 14px', display: 'flex', flexDirection: 'column', gap: 14 }}>
      {/* Header with who + date */}
      <Card style={{ padding: 12 }}>
        <div style={{ display: 'flex', alignItems: 'center', gap: 10 }}>
          <AnimalBadge animal={me.animal} size={34} />
          <div style={{ flex: 1 }}>
            <Eyebrow>Saisie pour</Eyebrow>
            <div style={{ fontFamily: S2FT, fontSize: 15, fontWeight: 600, color: S2.ink }}>{me.name}</div>
          </div>
          <div style={{ fontFamily: S2FM, fontSize: 11, color: S2.inkDim, padding: '6px 10px', borderRadius: 9, background: S2.inkXLow }}>📅 aujourd'hui</div>
        </div>
      </Card>

      {/* Live score preview (sticky feel) */}
      <Card glow style={{ padding: 14, background: `linear-gradient(150deg, ${accent}14, ${S2.bg0})`, border: `1px solid ${accent}33` }}>
        <div style={{ display: 'flex', alignItems: 'center', gap: 14 }}>
          <div style={{ width: 54, height: 54, borderRadius: '50%', display: 'grid', placeItems: 'center', fontSize: 28, background: `radial-gradient(circle at 35% 30%, ${S2.bg2}, ${S2.bg0})`, border: `1.5px solid ${accent}`, boxShadow: `0 0 18px ${accent}44` }}>{animal.emoji}</div>
          <div style={{ flex: 1 }}>
            <Eyebrow>Score en direct</Eyebrow>
            <div style={{ display: 'flex', alignItems: 'baseline', gap: 8 }}>
              <span style={{ fontFamily: S2FT, fontSize: 26, fontWeight: 700, color: S2.ink, lineHeight: 1 }}>{total > -900 ? total : 0}</span>
              <span style={{ fontFamily: S2FM, fontSize: 12, fontWeight: 700, color: accent }}>{animal.name}</span>
            </div>
            <div style={{ fontFamily: S2FM, fontSize: 9, color: S2.inkLow, marginTop: 3 }}>{filledCount}/6 catégories renseignées</div>
          </div>
        </div>
        {/* Mini per-axis bars */}
        <div style={{ display: 'grid', gridTemplateColumns: 'minmax(0,1fr) minmax(0,1fr) minmax(0,1fr)', gap: 6, marginTop: 12 }}>
          {AXES.map((ax, i) => (
            <div key={ax}>
              <div style={{ display: 'flex', justifyContent: 'space-between', marginBottom: 3 }}>
                <span style={{ fontFamily: S2FM, fontSize: 8, color: S2.inkLow, letterSpacing: 0.5 }}>{ax.slice(0, 4).toUpperCase()}</span>
                <span style={{ fontFamily: S2FM, fontSize: 8, color: present[i] ? accent : S2.inkLow }}>{present[i] ? stats[i] : '·'}</span>
              </div>
              <ProgressBar value={present[i] ? stats[i] : 0} color={accent} height={4} />
            </div>
          ))}
        </div>
      </Card>

      {/* Test fields grouped by category */}
      {CAT_ORDER.map((cat) => (
        <div key={cat}>
          <SectionTitle>{cat}</SectionTitle>
          <Card style={{ padding: '6px 12px' }}>
            {byCat[cat].map((t, idx) => {
              const isLeg = t.id === 'legext';
              const activeId = isLeg && legMode === 'backsquat' ? 'backsquat' : t.id;
              const activeMeta = isLeg && legMode === 'backsquat' ? t.alt : t;
              return (
                <div key={t.id} style={{ padding: '9px 0', borderBottom: idx < byCat[cat].length - 1 ? `1px solid ${S2.inkXLow}` : 'none' }}>
                  <div style={{ display: 'flex', alignItems: 'center', gap: 10 }}>
                    <div style={{ flex: 1, minWidth: 0 }}>
                      <div style={{ fontFamily: S2FT, fontSize: 13, color: S2.ink }}>{activeMeta.label}</div>
                      {isLeg && (
                        <div style={{ display: 'flex', gap: 4, marginTop: 5 }}>
                          {['legext', 'backsquat'].map((m) => (
                            <button key={m} onClick={() => setLegMode(m)} style={{
                              fontFamily: S2FM, fontSize: 8.5, padding: '2px 8px', borderRadius: 99, cursor: 'pointer',
                              border: `1px solid ${legMode === m ? accent : S2.inkXLow}`,
                              background: legMode === m ? `${accent}1a` : 'transparent',
                              color: legMode === m ? accent : S2.inkLow,
                            }}>{m === 'legext' ? 'Leg ext.' : 'Back squat'}</button>
                          ))}
                        </div>
                      )}
                    </div>
                    <input type="number" inputMode="decimal" placeholder="—"
                      value={vals[activeId] || ''}
                      onChange={(e) => set(activeId, e.target.value)}
                      style={inputStyle} />
                    <span style={{ fontFamily: S2FM, fontSize: 9.5, color: S2.inkLow, width: 28 }}>{activeMeta.unit}</span>
                  </div>
                </div>
              );
            })}
          </Card>
        </div>
      ))}

      {/* Save */}
      <button onClick={doSave} disabled={state.phase === 'saving'} style={{
        marginTop: 2, marginBottom: 8, padding: '14px', borderRadius: 14,
        cursor: state.phase === 'saving' ? 'wait' : 'pointer',
        border: 'none', background: `linear-gradient(135deg, ${S2.accentBright || accent}, ${accent})`,
        color: S2.bg0, fontFamily: S2FT, fontSize: 15, fontWeight: 700,
        boxShadow: `0 6px 20px ${accent}44`, opacity: state.phase === 'saving' ? 0.7 : 1,
      }}>{state.phase === 'saving' ? 'Enregistrement…' : '💾 Enregistrer le bilan'}</button>
      {state.phase === 'ok' && <div style={{ marginTop: -4, marginBottom: 8, fontFamily: S2FM, fontSize: 10.5, color: S2.good, textAlign: 'center' }}>✅ {state.msg}</div>}
      {state.phase === 'err' && <div style={{ marginTop: -4, marginBottom: 8, fontFamily: S2FM, fontSize: 10, color: S2.bad, textAlign: 'center' }}>{state.msg}</div>}
      <div style={{ fontFamily: S2FM, fontSize: 8.5, color: S2.inkLow, textAlign: 'center', marginTop: -2 }}>écrit directement dans ta base Supabase · date du jour</div>
    </div>
  );
}

// ════════════════════════════════════════════════════════════════════════
// ROSTER (tous les guerriers)
// ════════════════════════════════════════════════════════════════════════
function RosterScreen({ warriors, me, accent, onOpenFiche }) {
  const { Card, AnimalBadge, MiniHex } = window;
  const [q, setQ] = React.useState('');
  const [sort, setSort] = React.useState('rank'); // rank | name
  const filtered = warriors
    .filter((w) => w.name.toLowerCase().includes(q.toLowerCase()))
    .sort((a, b) => {
      if (sort === 'name') return a.name.localeCompare(b.name);
      // rank: data first by rank, then no-data
      if (a.hasData && !b.hasData) return -1;

function WeightSpark({ entries, width = 90, height = 28, color }) {
  if (!entries || entries.length < 2) return <div style={{ width, height }} />;
  const ws = entries.map((e) => e.weight);
  const min = Math.min(...ws), max = Math.max(...ws);
  const span = Math.max(0.5, max - min);
  const pts = ws.map((w, i) => [
    (i / (ws.length - 1)) * (width - 4) + 2,
    height - 3 - ((w - min) / span) * (height - 8),
  ]);
  const d = 'M' + pts.map((p) => p.join(',')).join(' L');
  const last = pts[pts.length - 1];
  return (
    <svg width={width} height={height} style={{ display: 'block' }}>
      <path d={d} fill="none" stroke={color} strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round" />
      <circle cx={last[0]} cy={last[1]} r="2.4" fill={color} />
    </svg>
  );
}

// Mini-courbe « tech » pleine largeur pour les cartes membres : aire dégradée,
// ligne accent + glow, points jalons discrets, et DERNIÈRE mesure = point bleu
// qui clignote/pulse (halo identique aux pics du radar fitness).
function WeightSparkTech({ entries, accent, gid, height = 48 }) {
  if (!entries || entries.length < 2) return null;
  const W = 320, padX = 6, padT = 9, padB = 8;
  const ws = entries.map((e) => e.weight);
  const min = Math.min.apply(null, ws), max = Math.max.apply(null, ws);
  const span = Math.max(0.4, max - min);
  const n = ws.length;
  const xAt = (i) => padX + (n <= 1 ? 0 : (i / (n - 1)) * (W - padX * 2));
  const yAt = (w) => padT + (1 - (w - min) / span) * (height - padT - padB);
  const pts = ws.map((w, i) => [xAt(i), yAt(w)]);
  const line = 'M' + pts.map((p) => p[0].toFixed(1) + ',' + p[1].toFixed(1)).join(' L');
  const last = pts[n - 1];
  const area = line + ' L' + last[0].toFixed(1) + ',' + (height - 1) + ' L' + pts[0][0].toFixed(1) + ',' + (height - 1) + ' Z';
  const id = 'ws_' + String(gid || 'x').replace(/[^a-zA-Z0-9_]/g, '');
  return (
    <svg viewBox={'0 0 ' + W + ' ' + height} width="100%" style={{ display: 'block', overflow: 'visible' }}>
      <defs>
        <linearGradient id={id + '_f'} x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stopColor={accent} stopOpacity="0.30" />
          <stop offset="100%" stopColor={accent} stopOpacity="0" />
        </linearGradient>
      </defs>
      <path d={area} fill={'url(#' + id + '_f)'} />
      <path d={line} fill="none" stroke={accent} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"
        style={{ filter: `drop-shadow(0 0 3px ${accent}99)` }} />
      {pts.slice(0, -1).map((p, i) => (
        <circle key={i} cx={p[0]} cy={p[1]} r="1.4" fill={accent} opacity="0.4" />
      ))}
      {/* dernière mesure : point bleu qui clignote/pulse */}
      <circle cx={last[0]} cy={last[1]} r="3" fill={accent} opacity="0.45">
        <animate attributeName="r" values="3;11;3" dur="1.8s" repeatCount="indefinite" />
        <animate attributeName="opacity" values="0.55;0;0.55" dur="1.8s" repeatCount="indefinite" />
      </circle>
      <circle cx={last[0]} cy={last[1]} r="3.1" fill={accent} stroke="#eaf9ff" strokeWidth="0.8">
        <animate attributeName="opacity" values="1;0.5;1" dur="1.8s" repeatCount="indefinite" />
      </circle>
    </svg>
  );
}

// Multi-series line chart (responsive via viewBox). entries: [{date, ...}].
// series: [{ key, label, color }]. Connects non-null points, breaks on gaps.
function LineChartMulti({ entries, series, yMin, yMax, height = 120, unit = '', integer = false }) {
  const W = 300, padL = 30, padR = 8, padT = 10, padB = 18;
  const plotW = W - padL - padR, plotH = height - padT - padB;
  const n = entries.length;
  // domain
  let lo = yMin, hi = yMax;
  if (lo == null || hi == null) {
    const all = [];
    series.forEach((s) => entries.forEach((e) => { if (e[s.key] != null) all.push(e[s.key]); }));
    if (all.length) { lo = lo == null ? Math.min(...all) : lo; hi = hi == null ? Math.max(...all) : hi; }
    if (lo == null) { lo = 0; hi = 1; }
    if (hi - lo < 0.5) { hi = lo + 1; }
    // pad
    const pad = (hi - lo) * 0.12;
    lo -= pad; hi += pad;
  }
  const xAt = (i) => padL + (n <= 1 ? plotW / 2 : (i / (n - 1)) * plotW);
  const yAt = (v) => padT + plotH - ((v - lo) / (hi - lo)) * plotH;
  const fmt = (v) => integer ? Math.round(v).toLocaleString('fr-FR') : (Math.round(v * 10) / 10);

  // build path per series, splitting on nulls
  const paths = series.map((s) => {
    let d = '', pen = false, lastPt = null;
    entries.forEach((e, i) => {
      const v = e[s.key];
      if (v == null) { pen = false; return; }
      const x = xAt(i), y = yAt(v);
      d += (pen ? ' L' : ' M') + x + ',' + y;
      pen = true; lastPt = [x, y, v];
    });
    return { ...s, d, lastPt };
  });

  const dateLbl = (iso) => { const d = new Date(iso); return isNaN(d) ? '' : `${String(d.getDate()).padStart(2, '0')}/${String(d.getMonth() + 1).padStart(2, '0')}`; };

  return (
    <svg viewBox={`0 0 ${W} ${height}`} width="100%" style={{ display: 'block', overflow: 'visible' }}>
      {/* gridlines */}
      {[0, 0.5, 1].map((f, i) => {
        const y = padT + plotH * f;
        const val = hi - (hi - lo) * f;
        return (
          <g key={i}>
            <line x1={padL} y1={y} x2={W - padR} y2={y} stroke={S3.inkXLow} strokeWidth={0.7} strokeDasharray={i === 2 ? '' : '2 4'} />
            <text x={padL - 5} y={y + 3} textAnchor="end" fontFamily={S3FM} fontSize={7.5} fill={S3.inkLow}>{fmt(val)}</text>
          </g>
        );
      })}
      {/* x labels (first / mid / last) */}
      {n > 0 && [0, Math.floor((n - 1) / 2), n - 1].filter((v, idx, a) => a.indexOf(v) === idx).map((i) => (
        <text key={i} x={xAt(i)} y={height - 5} textAnchor="middle" fontFamily={S3FM} fontSize={7.5} fill={S3.inkLow}>{dateLbl(entries[i].date)}</text>
      ))}
      {/* series */}
      {paths.map((p) => (
        <g key={p.key}>
          <path d={p.d} fill="none" stroke={p.color} strokeWidth={2} strokeLinecap="round" strokeLinejoin="round" />
          {p.lastPt && <circle cx={p.lastPt[0]} cy={p.lastPt[1]} r={2.8} fill={p.color} />}
        </g>
      ))}
    </svg>
  );
}

function BodyEncodeForm({ b, me, accent, reload }) {
  const todayISO = window.todayISO;
  const [open, setOpen] = React.useState(false);
  const [editId, setEditId] = React.useState(null);
  const [date, setDate] = React.useState(todayISO());
  const [vals, setVals] = React.useState({ weight: b.current != null ? String(b.current) : '', sportHours: '', avgSteps: '', energy: '', motivation: '', cravings: '' });
  const [state, setState] = React.useState({ phase: 'idle', msg: '' });
  const set = (k, v) => { setVals((s) => ({ ...s, [k]: v })); setState({ phase: 'idle', msg: '' }); };

  const entries = b.entries || [];
  const recent = entries.slice().reverse().slice(0, 6);

  const loadEntry = (e) => {
    setEditId(e.id);
    setDate(e.date);
    setVals({
      weight: e.weight != null ? String(e.weight) : '',
      sportHours: e.sportHours != null ? String(e.sportHours) : '',
      avgSteps: e.avgSteps != null ? String(e.avgSteps) : '',
      energy: e.energy != null ? String(e.energy) : '',
      motivation: e.motivation != null ? String(e.motivation) : '',
      cravings: e.cravings != null ? String(e.cravings) : '',
    });
    setOpen(true);
  };

  const resetForm = () => {
    setEditId(null); setDate(todayISO());
    setVals({ weight: b.current != null ? String(b.current) : '', sportHours: '', avgSteps: '', energy: '', motivation: '', cravings: '' });
  };

  const doSave = async () => {
    const w = parseFloat(vals.weight);
    if (isNaN(w) || w <= 0) { setState({ phase: 'err', msg: 'Entre un poids valide' }); return; }
    if (state.phase === 'saving') return;
    setState({ phase: 'saving', msg: '' });
    // compute resulting weekly status for sound (vs previous entry before this date)
    const prior = entries.filter((e) => e.date < date);
    let color = 'green';
    if (prior.length) {
      const prev = prior[prior.length - 1];
      const days = Math.max(1, (new Date(date) - new Date(prev.date)) / 86400000);
      const paceKg = ((w - prev.weight) / days) * 7;
      color = window.bodyPaceColor(b, paceKg);
    }
    try {
      await window.saveBodyEntryLive({
        warriorId: b.w.id, entryDate: date, weight: w,
        sportHours: vals.sportHours, avgSteps: vals.avgSteps,
        energy: vals.energy, cravings: vals.cravings, motivation: vals.motivation,
      });
      window.playBodySound(color === 'green' ? 'celebration' : color === 'red' ? 'bad' : 'good');
      if (color === 'green' && prior.length && window.writeFeedLive) {
        const dKg = Math.round((w - prior[prior.length - 1].weight) * 10) / 10;
        try {
          window.writeFeedLive({
            id: 'fd_bt_' + b.w.id + '_' + date,
            type: 'body_target', warriorId: b.w.id,
            message: b.w.name + ' a tenu sa cible de poids cette semaine ! (' + (dKg > 0 ? '+' : '') + dKg + ' kg)',
          });
        } catch (e) {}
      }
      setState({ phase: 'ok', msg: editId ? 'Encodage corrigé ✓' : 'Encodage enregistré ✓' });
      resetForm();
      if (reload) reload();
    } catch (e) {
      setState({ phase: 'err', msg: 'Erreur : ' + (e.message || e) });
    }
  };

  const doDelete = async (e) => {
    if (!window.confirm('Supprimer l\'encodage du ' + fmtDateShort(e.date) + ' ?')) return;
    try { await window.deleteBodyEntryLive(e.id); if (reload) reload(); } catch (err) {}
  };

  const field = (label, k, unit, step) => (
    <div style={{ display: 'flex', flexDirection: 'column', gap: 3 }}>
      <label style={{ fontFamily: S3FM, fontSize: 8.5, color: S3.inkLow, letterSpacing: 0.4 }}>{label}</label>
      <div style={{ display: 'flex', alignItems: 'center', background: S3.inkXLow, borderRadius: 9, padding: '0 9px', border: `1px solid ${S3.inkXLow}` }}>
        <input value={vals[k]} onChange={(ev) => set(k, ev.target.value)} type="number" step={step || 'any'} inputMode="decimal" placeholder="—"
          style={{ flex: 1, background: 'none', border: 'none', outline: 'none', color: S3.ink, fontFamily: S3FM, fontSize: 14, fontWeight: 700, width: '100%', padding: '9px 0' }} />
        {unit && <span style={{ fontFamily: S3FM, fontSize: 9, color: S3.inkLow }}>{unit}</span>}
      </div>
    </div>
  );

  return (
    <div style={{ borderRadius: 14, border: `1px solid ${accent}33`, background: `${S3.bg1}cc`, padding: 12 }}>
      <button onClick={() => { if (open) resetForm(); setOpen((o) => !o); setState({ phase: 'idle', msg: '' }); }} style={{
        width: '100%', display: 'flex', alignItems: 'center', justifyContent: 'space-between', cursor: 'pointer',
        background: 'none', border: 'none', color: S3.ink, fontFamily: S3FT, fontSize: 13, fontWeight: 700, padding: 0,
      }}>
        <span>✎ Encoder / corriger mon poids</span>
        <span style={{ color: accent, fontSize: 16 }}>{open ? '▾' : '＋'}</span>
      </button>

      {open && (
        <div style={{ marginTop: 11, display: 'flex', flexDirection: 'column', gap: 9 }}>
          <div style={{ display: 'flex', flexDirection: 'column', gap: 3 }}>
            <label style={{ fontFamily: S3FM, fontSize: 8.5, color: S3.inkLow, letterSpacing: 0.4 }}>DATE {editId ? '(correction)' : ''}</label>
            <input value={date} onChange={(e) => setDate(e.target.value)} type="date"
              style={{ background: S3.inkXLow, border: `1px solid ${S3.inkXLow}`, borderRadius: 9, padding: '9px', color: S3.ink, fontFamily: S3FM, fontSize: 13 }} />
          </div>
          <div style={{ display: 'grid', gridTemplateColumns: 'minmax(0,1fr) minmax(0,1fr)', gap: 8 }}>
            {field('POIDS', 'weight', 'kg')}
            {field('SPORT / SEM', 'sportHours', 'h')}
            {field('PAS MOYENS', 'avgSteps', 'pas')}
            {field('ÉNERGIE', 'energy', '/5')}
            {field('MOTIVATION', 'motivation', '/5')}
            {field('ENVIES ALIM.', 'cravings', '/5')}
          </div>
          <button onClick={doSave} disabled={state.phase === 'saving'} style={{
            padding: '12px', borderRadius: 11, cursor: state.phase === 'saving' ? 'wait' : 'pointer', border: 'none',
            background: `linear-gradient(135deg, ${S3.accentBright || accent}, ${accent})`, color: S3.bg0,
            fontFamily: S3FT, fontSize: 14, fontWeight: 700, boxShadow: `0 4px 16px ${accent}44`, opacity: state.phase === 'saving' ? 0.7 : 1,
          }}>{state.phase === 'saving' ? 'Enregistrement…' : editId ? '💾 Corriger' : '💾 Enregistrer'}</button>
          {state.phase === 'ok' && <div style={{ fontFamily: S3FM, fontSize: 10, color: PACE_COLORS.green, textAlign: 'center' }}>✅ {state.msg}</div>}
          {state.phase === 'err' && <div style={{ fontFamily: S3FM, fontSize: 10, color: PACE_COLORS.red, textAlign: 'center' }}>{state.msg}</div>}
          {editId && <button onClick={resetForm} style={{ background: 'none', border: 'none', color: S3.inkLow, fontFamily: S3FM, fontSize: 10, cursor: 'pointer' }}>+ nouvel encodage</button>}

          {/* recent entries to correct/delete */}
          {recent.length > 0 && (
            <div style={{ marginTop: 4, borderTop: `1px solid ${S3.inkXLow}`, paddingTop: 8 }}>
              <div style={{ fontFamily: S3FM, fontSize: 8.5, color: S3.inkLow, letterSpacing: 0.4, marginBottom: 6 }}>DERNIERS ENCODAGES</div>
              <div style={{ display: 'flex', flexDirection: 'column', gap: 4 }}>
                {recent.map((e) => (
                  <div key={e.id} style={{ display: 'flex', alignItems: 'center', gap: 8, fontFamily: S3FM, fontSize: 11, color: S3.inkDim }}>
                    <span style={{ width: 42 }}>{fmtDateShort(e.date)}</span>
                    <span style={{ flex: 1, color: S3.ink, fontWeight: 700 }}>{e.weight} kg</span>
                    <button onClick={() => loadEntry(e)} style={{ background: 'none', border: `1px solid ${S3.inkXLow}`, borderRadius: 7, color: accent, cursor: 'pointer', fontSize: 11, padding: '3px 8px' }}>✎</button>
                    <button onClick={() => doDelete(e)} style={{ background: 'none', border: `1px solid ${S3.inkXLow}`, borderRadius: 7, color: PACE_COLORS.red, cursor: 'pointer', fontSize: 11, padding: '3px 8px' }}>🗑</button>
                  </div>
                ))}
              </div>
            </div>
          )}
        </div>
      )}
    </div>
  );
}

                      <div style={{ fontFamily: S3FM, fontSize: 8, color: S3.inkLow, whiteSpace: 'nowrap', overflow: 'hidden', textOverflow: 'ellipsis' }}>{m.desc}</div>
                    </div>
                    {reached && <span style={{ color: accent, fontSize: 12 }}>✓</span>}
                  </div>
                );
              })}
            </div>
          </Card>
        </div>
      )}

      {/* cadence color legend */}
      <div style={{ display: 'flex', gap: 10, flexWrap: 'wrap', justifyContent: 'center', fontFamily: S3FM, fontSize: 8.5, color: S3.inkLow, marginTop: -4 }}>
        {['green', 'yellow', 'orange', 'red'].map((c) => (
          <span key={c} style={{ display: 'inline-flex', alignItems: 'center', gap: 4 }}>
            <span style={{ width: 8, height: 8, borderRadius: 2, background: PACE_COLORS[c] }} />{PACE_LABEL[c]}
          </span>
        ))}
      </div>

      {mine && (
        <div>
          <SectionTitle>Mon objectif</SectionTitle>
          {renderCard(mine, true)}
        </div>
      )}
      <div>
        <SectionTitle right={`${others.length}`}>{mine ? 'La tribu' : 'Objectifs de l\'équipe'}</SectionTitle>
        <div style={{ display: 'flex', flexDirection: 'column', gap: 10, paddingBottom: 6 }}>
          {others.map((b) => renderCard(b, false))}
        </div>
      </div>
    </div>
  );
}

Object.assign(window, { RankingsScreen, CorpsScreen, BodyDetailScreen, LineChartMulti, GaugeBalance });

</script>
<script type="text/babel" data-from="app-social.jsx">
// app-social.jsx — Encouragements: reactions on feed items (1 per person),
// stacked reactor avatars, home banner + "Encouragements" inbox with badge.

const SOC = window.APP_T;
const SOCFT = window.APP_FT;
const SOCFM = window.APP_FM;

const REACTIONS = [
  { type: 'ahou',    emoji: '🛡️', label: 'AHOU',    color: '#67e8f9' },
  { type: 'respect', emoji: '👊', label: 'RESPECT', color: '#fbbf24' },
  { type: 'frozen',  emoji: '❄️', label: 'FROZEN',  color: '#a5d8ea' },
  { type: 'fire',    emoji: '🔥', label: 'FIRE',    color: '#fb7185' },
];
const REACTION_BY_TYPE = REACTIONS.reduce((m, r) => { m[r.type] = r; return m; }, {});

// ─── small reactor avatar (animal emoji or fallback) ───────────────────
function ReactorDot({ animal, size = 22, ring = SOC.bg1 }) {
  return (
    <div style={{
      width: size, height: size, borderRadius: '50%', flexShrink: 0,
      background: SOC.bg2, border: `2px solid ${ring}`,
      display: 'grid', placeItems: 'center', fontSize: size * 0.52,
      boxShadow: `0 0 0 1px ${SOC.inkXLow}`,
    }}>{animal && animal.emoji ? animal.emoji : '🧊'}</div>
  );
}

// ─── encouragement helpers ─────────────────────────────────────────────
function myReceivedEncouragements(feed, meId) {
  if (!meId) return [];
  const out = [];
  (feed || []).forEach((item) => {
    if (item.warriorId !== meId) return;
    (item.reactions || []).forEach((r) => {
      if (r.warriorId === meId) return; // ignore self-reactions
      out.push({ r, item });
    });
  });
  out.sort((a, b) => String(b.r.createdAt || '').localeCompare(String(a.r.createdAt || '')));
  return out;
}

function encSeenKey(meId) { return 'fw_enc_seen_' + meId; }
function getEncSeen(meId) { try { return localStorage.getItem(encSeenKey(meId)) || ''; } catch (e) { return ''; } }
function markEncSeen(meId) { try { localStorage.setItem(encSeenKey(meId), new Date().toISOString()); } catch (e) {} }

function encBadgeCount(feed, meId) {
  const seen = getEncSeen(meId);
  return myReceivedEncouragements(feed, meId).filter(({ r }) => (r.createdAt || '') > seen).length;
}

function recentReactorCount(feed, meId, days = 7) {
  const since = Date.now() - days * 86400000;
  const ids = new Set();
  myReceivedEncouragements(feed, meId).forEach(({ r }) => {
    const t = r.createdAt ? new Date(r.createdAt).getTime() : 0;
    if (t >= since) ids.add(r.warriorId);
  });
  return ids.size;
}

// ─── reaction bar (the 4 pills) ────────────────────────────────────────
function ReactionBar({ reactions, mine, onReact, accent }) {
  const counts = {};
  (reactions || []).forEach((r) => { counts[r.type] = (counts[r.type] || 0) + 1; });
  return (
    <div style={{ display: 'flex', gap: 5, flexWrap: 'wrap' }}>
      {REACTIONS.map((R) => {
        const n = counts[R.type] || 0;
        const active = mine === R.type;
        return (
          <button key={R.type} onClick={(e) => { e.stopPropagation(); onReact(R.type); }} style={{
            display: 'inline-flex', alignItems: 'center', gap: 4,
            padding: n > 0 ? '4px 9px' : '4px 8px', borderRadius: 99, cursor: 'pointer',
            border: `1px solid ${active ? R.color : SOC.inkXLow}`,
            background: active ? `${R.color}22` : `${SOC.bg2}99`,
            transition: 'transform 0.12s ease',
            transform: active ? 'scale(1.04)' : 'scale(1)',
          }}>
            <span style={{ fontSize: 12, lineHeight: 1 }}>{R.emoji}</span>
            {n > 0 && <span style={{ fontFamily: SOCFM, fontSize: 10, fontWeight: 700, color: active ? R.color : SOC.inkDim }}>{n}</span>}
          </button>
        );
      })}
    </div>
  );
}

// ─── feed item with reactions + reactor stack ──────────────────────────
function FeedItem({ f, me, accent, onReact }) {
  const FEED_ICONS = window.FEED_ICONS;
  const relativeTime = window.relativeTime;
  const [local, setLocal] = React.useState(f.reactions || []);
  const [open, setOpen] = React.useState(false);
  const sig = (f.reactions || []).map((r) => r.warriorId + r.type).join('|');
  React.useEffect(() => { setLocal(f.reactions || []); }, [sig]);

  const mine = (local.find((r) => r.warriorId === (me && me.id)) || {}).type || null;

  const react = (type) => {
    const remove = mine === type;
    // optimistic
    let next = local.filter((r) => r.warriorId !== me.id);
    if (!remove) next = next.concat([{ id: 'fr_' + f.id + '_' + me.id, warriorId: me.id, warriorName: me.name, type, animal: me.animal || null, createdAt: new Date().toISOString() }]);
    setLocal(next);
    if (onReact) onReact(f.id, type, remove);
  };

  const isMine = f.warriorId && me && f.warriorId === me.id;
  const shown = local.slice(0, 6);
  const extra = local.length - shown.length;

  return (
    <div style={{
      display: 'flex', gap: 10, alignItems: 'flex-start', padding: '9px 11px', borderRadius: 12,
      background: isMine ? `${accent}10` : `${SOC.bg1}99`,
      border: `1px solid ${isMine ? accent + '44' : SOC.inkXLow}`,
    }}>
      <div style={{ fontSize: 16, lineHeight: 1.2, flexShrink: 0 }}>{FEED_ICONS[f.type] || '⚡'}</div>
      <div style={{ flex: 1, minWidth: 0 }}>
        <div style={{ fontFamily: SOCFT, fontSize: 12, color: SOC.inkDim, lineHeight: 1.35 }}>{f.message}</div>
        <div style={{ fontFamily: SOCFM, fontSize: 8.5, color: SOC.inkLow, marginTop: 3 }}>
          {relativeTime(f.createdAt)}{isMine ? ' · toi' : ''}
        </div>

        {/* reactor stack (2A) */}
        {local.length > 0 && (
          <div onClick={() => setOpen((o) => !o)} style={{ display: 'flex', alignItems: 'center', gap: 6, marginTop: 8, cursor: 'pointer' }}>
            <div style={{ display: 'flex' }}>
              {shown.map((r, i) => (
                <div key={r.id || i} style={{ marginLeft: i === 0 ? 0 : -7, position: 'relative' }}>
                  <ReactorDot animal={r.animal} />
                  <span style={{ position: 'absolute', right: -3, bottom: -3, fontSize: 9 }}>{(REACTION_BY_TYPE[r.type] || {}).emoji}</span>
                </div>
              ))}
            </div>
            {extra > 0 && <span style={{ fontFamily: SOCFM, fontSize: 10, color: SOC.inkLow, marginLeft: 2 }}>+{extra}</span>}
            <span style={{ fontFamily: SOCFM, fontSize: 9, color: SOC.inkLow }}>{open ? '▾' : '·'}</span>
          </div>
        )}

        {/* expanded reactor list */}
        {open && local.length > 0 && (
          <div style={{ marginTop: 7, display: 'flex', flexDirection: 'column', gap: 5, padding: '8px 9px', borderRadius: 10, background: `${SOC.bg2}aa`, border: `1px solid ${SOC.inkXLow}` }}>
            {local.slice().sort((a, b) => String(b.createdAt || '').localeCompare(String(a.createdAt || ''))).map((r, i) => (
              <div key={r.id || i} style={{ display: 'flex', alignItems: 'center', gap: 8 }}>
                <ReactorDot animal={r.animal} size={18} ring={SOC.bg2} />
                <span style={{ flex: 1, fontFamily: SOCFT, fontSize: 11, color: SOC.ink, whiteSpace: 'nowrap', overflow: 'hidden', textOverflow: 'ellipsis' }}>
                  {r.warriorId === (me && me.id) ? 'Toi' : r.warriorName}
                </span>
                <span style={{ fontSize: 12 }}>{(REACTION_BY_TYPE[r.type] || {}).emoji}</span>
              </div>
            ))}
          </div>
        )}

        {/* reaction bar (1A) */}
        <div style={{ marginTop: 8 }}>
          <ReactionBar reactions={local} mine={mine} onReact={react} accent={accent} />
        </div>
      </div>
    </div>
  );
}

// ─── home banner (3C) ──────────────────────────────────────────────────
function EncouragementBanner({ feed, me, accent, onOpen }) {
  const n = recentReactorCount(feed, me && me.id, 7);
  if (!n) return null;
  const recent = myReceivedEncouragements(feed, me && me.id).slice(0, 4);
  return (
    <div onClick={onOpen} style={{
      display: 'flex', alignItems: 'center', gap: 11, cursor: 'pointer',
      padding: '12px 14px', borderRadius: 14, marginBottom: 4,
      background: `linear-gradient(120deg, ${accent}22, ${SOC.bg1}aa)`,
      border: `1px solid ${accent}55`,
    }}>
      <div style={{ fontSize: 22 }}>👏</div>
      <div style={{ flex: 1, minWidth: 0 }}>
        <div style={{ fontFamily: SOCFT, fontSize: 13, fontWeight: 700, color: SOC.ink }}>
          {n} guerrier{n > 1 ? 's' : ''} t'{n > 1 ? 'ont' : 'a'} encouragé cette semaine
        </div>
        <div style={{ fontFamily: SOCFM, fontSize: 9.5, color: SOC.inkDim, marginTop: 1 }}>Touche pour voir qui →</div>
      </div>
      <div style={{ display: 'flex' }}>
        {recent.map(({ r }, i) => (
          <div key={r.id || i} style={{ marginLeft: i === 0 ? 0 : -7 }}><ReactorDot animal={r.animal} /></div>
        ))}
      </div>
    </div>
  );
}

// ─── encouragements inbox (3A) ─────────────────────────────────────────
function EncouragementsScreen({ feed, me, accent, onOpenFiche }) {
  const list = myReceivedEncouragements(feed, me && me.id);
  const relativeTime = window.relativeTime;
  React.useEffect(() => { markEncSeen(me && me.id); }, [me && me.id]);

  if (!list.length) {
    return (
      <div style={{ padding: '46px 28px', textAlign: 'center' }}>
        <div style={{ fontSize: 40, marginBottom: 12 }}>👏</div>
        <div style={{ fontFamily: SOCFT, fontSize: 16, color: SOC.ink, marginBottom: 6 }}>Pas encore d'encouragement</div>
        <div style={{ fontFamily: SOCFM, fontSize: 11, color: SOC.inkLow, lineHeight: 1.5 }}>
          Quand un guerrier réagira à un de tes records ou bonnes habitudes, ça apparaîtra ici.
        </div>
      </div>
    );
  }

  // group consecutive by feed item for context
  return (
    <div style={{ padding: '4px 14px 8px', display: 'flex', flexDirection: 'column', gap: 8 }}>
      <div style={{ fontFamily: SOCFM, fontSize: 9.5, color: SOC.inkLow, letterSpacing: 0.5, paddingLeft: 2 }}>
        {list.length} encouragement{list.length > 1 ? 's' : ''} reçu{list.length > 1 ? 's' : ''}
      </div>
      {list.map(({ r, item }, i) => {
        const R = REACTION_BY_TYPE[r.type] || {};
        return (
          <div key={(r.id || i) + '_' + i} style={{
            display: 'flex', alignItems: 'center', gap: 11, padding: '10px 12px', borderRadius: 13,
            background: `${SOC.bg1}cc`, border: `1px solid ${SOC.inkXLow}`,
          }}>
            <div style={{ position: 'relative', flexShrink: 0 }}>
              <ReactorDot animal={r.animal} size={34} />
              <span style={{ position: 'absolute', right: -4, bottom: -4, fontSize: 14 }}>{R.emoji}</span>
            </div>
            <div style={{ flex: 1, minWidth: 0 }}>
              <div style={{ fontFamily: SOCFT, fontSize: 12.5, color: SOC.ink }}>
                <b>{r.warriorName}</b> t'a envoyé <b style={{ color: R.color }}>{R.label}</b>
              </div>
              <div style={{ fontFamily: SOCFM, fontSize: 9.5, color: SOC.inkLow, marginTop: 2, whiteSpace: 'nowrap', overflow: 'hidden', textOverflow: 'ellipsis' }}>
                sur : {item.message}
              </div>
            </div>
            <span style={{ fontFamily: SOCFM, fontSize: 8.5, color: SOC.inkLow, flexShrink: 0 }}>{relativeTime(r.createdAt)}</span>
          </div>
        );
      })}
    </div>
  );
}

Object.assign(window, {
  REACTIONS, REACTION_BY_TYPE, ReactionBar, FeedItem, ReactorDot,
  EncouragementBanner, EncouragementsScreen,
  myReceivedEncouragements, encBadgeCount, recentReactorCount, markEncSeen,
});

</script>
<script type="text/babel">
function MobileRoot(){
  // Hauteur de viewport DYNAMIQUE en CSS (100dvh) avec repli 100vh : suit la barre
  // d'adresse iOS nativement, sans re-render au scroll (sinon l'écran « remonte tout seul »).
  return (
    <React.Fragment>
      <style>{`.fw-app-root{height:100vh;height:100dvh;width:100%;}`}</style>
      <div className="fw-app-root"><FWApp accent="#67e8f9" particlesOn={true} /></div>
    </React.Fragment>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<MobileRoot />);
</script>
<script>
(function(){
  var sp=document.getElementById('fw-splash'); if(!sp) return;
  var snow=sp.querySelector('.fw-snow');
  var reduce=window.matchMedia&&window.matchMedia('(prefers-reduced-motion: reduce)').matches;
  var N=reduce?14:60;
  for(var i=0;i<N;i++){
    var s=1.4+Math.random()*2.6, cyan=Math.random()<0.4;
    var f=document.createElement('span'); f.className='fw-flake';
    f.style.left=(Math.random()*100)+'%';
    f.style.width=s+'px'; f.style.height=s+'px';
    f.style.background=cyan?'#67e8f9':'#eaf6ff';
    if(cyan) f.style.boxShadow='0 0 '+(s*2)+'px rgba(103,232,249,.5)';
    if(s<2.2) f.style.filter='blur(.4px)';
    f.style.setProperty('--op',(0.25+Math.random()*0.6));
    f.style.setProperty('--drift',(Math.random()*80-40)+'px');
    if(reduce){ f.style.top=(Math.random()*100)+'%'; f.style.opacity=0.5; }
    else { f.style.animation='fw-fall '+(7+Math.random()*8)+'s linear '+(-(Math.random()*15))+'s infinite'; }
    snow.appendChild(f);
  }
  var done=false;
  function dismiss(){ if(done) return; done=true; sp.classList.add('fw-hide');
    setTimeout(function(){ if(sp&&sp.parentNode) sp.parentNode.removeChild(sp); },550); }
  var t=setTimeout(dismiss, 5000);
  sp.addEventListener('pointerdown', function(){ clearTimeout(t); dismiss(); }, {once:true});
})();
</script>
